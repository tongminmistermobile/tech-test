<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>维修话术查询系统 · 线下技术员定购与诊断</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --bg: #f7f6f3;
    --bg-elevated: #ffffff;
    --bg-sidebar: #1c1f2a;
    --bg-sidebar-hover: #272b3a;
    --text: #1c1f2a;
    --text-muted: #6b7180;
    --text-on-dark: #e8e7e3;
    --text-on-dark-muted: #8b91a3;
    --border: #e5e3dc;
    --border-strong: #d4d1c5;
    --accent: #c2410c;
    --accent-deep: #9a3412;
    --accent-soft: #fef3e9;
    --role-cs: #0369a1;
    --role-cs-bg: #eff8ff;
    --role-fd: #15803d;
    --role-fd-bg: #f0fdf4;
    --role-tech: #7c2d12;
    --role-tech-bg: #fef3e9;
    --role-parts: #6b21a8;
    --role-parts-bg: #faf5ff;
    --tag-warn: #b91c1c;
    --tag-warn-bg: #fef2f2;
    --tag-info: #0369a1;
    --tag-info-bg: #eff8ff;
    --tag-success: #15803d;
    --tag-success-bg: #f0fdf4;
    --edit: #d97706;
    --edit-bg: #fef3c7;
    --danger: #dc2626;
    --font-display: 'Noto Serif SC', Georgia, serif;
    --font-body: 'Noto Sans SC', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --shadow-sm: 0 1px 2px rgba(28, 31, 42, 0.05);
    --shadow-md: 0 4px 12px rgba(28, 31, 42, 0.08);
    --shadow-lg: 0 12px 32px rgba(28, 31, 42, 0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ========== 顶部工具条 ========== */
  .topbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    height: 44px;
    flex-shrink: 0;
  }
  .topbar-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    color: var(--text-on-dark);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all .15s ease;
    font-weight: 500;
  }
  .topbar-btn:hover {
    background: rgba(255,255,255,0.12);
  }
  .topbar-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
  }
  .topbar-btn.primary:hover {
    background: var(--accent-deep);
  }
  .topbar-btn.edit-on {
    background: var(--edit);
    border-color: var(--edit);
    color: #fff;
  }
  /* ========== 场景切换器 ========== */
  .scene-switcher {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
    margin-right: 12px;
  }
  .scene-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--text-on-dark-muted);
    border: none;
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 12.5px;
    font-family: var(--font-body);
    font-weight: 600;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .scene-btn:hover {
    color: var(--text-on-dark);
  }
  .scene-btn.active {
    color: #fff;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .scene-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }
  .scene-dot.offline { background: #c2410c; }   /* 线下 — terracotta */
  .scene-dot.online { background: #0369a1; }    /* 线上 — 海蓝 */
  .scene-dot.mac { background: #0d9488; }       /* Mac — 青绿 */
  .scene-dot.quiz { background: #7c3aed; }      /* 招聘 — 紫 */

  /* 场景为 online 时，accent 色变蓝 */
  body[data-scene="online"] {
    --accent: #0369a1;
    --accent-deep: #075985;
    --accent-soft: #e0f2fe;
  }
  /* 场景为 mac 时，accent 色变青绿 */
  body[data-scene="mac"] {
    --accent: #0d9488;
    --accent-deep: #115e59;
    --accent-soft: #ccfbf1;
  }
  /* 场景为 quiz 时，accent 色变紫色 */
  body[data-scene="quiz"] {
    --accent: #7c3aed;
    --accent-deep: #5b21b6;
    --accent-soft: #ede9fe;
  }

  /* ========== 汇率输入框 ========== */
  .rate-box {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(13, 148, 136, 0.15);
    border: 1px solid rgba(13, 148, 136, 0.4);
    border-radius: 8px;
    padding: 4px 10px;
    margin-right: 12px;
  }
  .rate-label {
    color: #5eead4;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }
  .rate-input-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-on-dark);
    font-size: 12.5px;
  }
  .rate-prefix, .rate-suffix {
    color: var(--text-on-dark-muted);
    font-family: var(--font-mono);
  }
  .rate-input {
    width: 56px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 5px;
    padding: 3px 6px;
    color: #5eead4;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    -moz-appearance: textfield;
  }
  .rate-input:focus {
    outline: none;
    border-color: #5eead4;
    background: rgba(0, 0, 0, 0.4);
  }
  .rate-input::-webkit-outer-spin-button,
  .rate-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .topbar-status {
    margin-right: auto;
    color: var(--text-on-dark-muted);
    font-size: 11.5px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .topbar-status .save-indicator {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16a34a;
    margin-right: 6px;
    vertical-align: middle;
  }
  .topbar-status.saving .save-indicator { background: var(--edit); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ========== 应用布局 ========== */
  .app {
    display: grid;
    grid-template-columns: 280px 360px 1fr;
    height: calc(100vh - 44px);
  }

  /* ========== 侧边栏 ========== */
  .sidebar {
    background: var(--bg-sidebar);
    color: var(--text-on-dark);
    overflow-y: auto;
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 24px 24px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    background: var(--bg-sidebar);
    z-index: 2;
  }
  .sidebar-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .sidebar-subtitle {
    font-size: 11.5px;
    color: var(--text-on-dark-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    margin-top: 4px;
  }
  .sidebar-divider {
    height: 2px;
    background: var(--accent);
    width: 32px;
    margin-top: 12px;
  }
  .sidebar-search {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .search-box { position: relative; }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 9px 12px 9px 34px;
    color: var(--text-on-dark);
    font-family: var(--font-body);
    font-size: 13px;
  }
  .search-input::placeholder { color: var(--text-on-dark-muted); }
  .search-input:focus { outline: none; background: rgba(255,255,255,0.10); border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-on-dark-muted);
  }

  .category-list {
    padding: 10px 12px 12px;
    overflow-y: auto;
    flex: 1;
  }
  .category-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-on-dark-muted);
    font-size: 13.5px;
    font-weight: 500;
    transition: all .12s ease;
    margin-bottom: 2px;
    border-left: 3px solid transparent;
    position: relative;
  }
  .category-item:hover {
    background: var(--bg-sidebar-hover);
    color: var(--text-on-dark);
  }
  .category-item.active {
    background: rgba(194, 65, 12, 0.12);
    color: #fff;
    border-left-color: var(--accent);
  }
  .category-icon {
    width: 26px; height: 26px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    background: rgba(255,255,255,0.06);
    font-size: 14px;
    flex-shrink: 0;
  }
  .category-item.active .category-icon { background: var(--accent); }
  .category-name { flex: 1; }
  .category-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-on-dark-muted);
    background: rgba(255,255,255,0.04);
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }
  .category-item.active .category-count {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .category-edit, .category-delete {
    display: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1;
  }
  .category-edit { color: var(--edit); }
  .category-edit:hover { background: rgba(217, 119, 6, 0.2); }
  .category-delete { color: var(--danger); }
  .category-delete:hover { background: rgba(220, 38, 38, 0.2); }
  body.edit-mode .category-edit,
  body.edit-mode .category-delete { display: inline-block; }
  body.edit-mode .category-count { display: none; }

  .sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: var(--text-on-dark-muted);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .stats-row { display: flex; justify-content: space-between; align-items: center; }

  .add-category-btn {
    display: none;
    width: calc(100% - 24px);
    margin: 8px 12px;
    padding: 10px;
    background: rgba(217, 119, 6, 0.15);
    color: var(--edit);
    border: 1px dashed var(--edit);
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .add-category-btn:hover { background: rgba(217, 119, 6, 0.25); }
  body.edit-mode .add-category-btn { display: block; }

  /* ========== 故障列表区 ========== */
  .fault-list-pane {
    background: var(--bg);
    overflow-y: auto;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .fault-list-header {
    padding: 24px 26px 14px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 2;
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .fault-list-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.02em;
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .fault-list-title .accent-line {
    width: 26px;
    height: 4px;
    background: var(--accent);
    display: inline-block;
    flex-shrink: 0;
  }
  .fault-list {
    padding: 14px 18px 24px;
    overflow-y: auto;
    flex: 1;
  }
  .fault-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 9px;
    cursor: pointer;
    transition: all .15s ease;
    position: relative;
  }
  .fault-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .fault-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .fault-card.active::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 12px;
    bottom: 12px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .fault-cat-label {
    font-size: 10.5px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
  }
  .fault-symptom {
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 7px;
  }
  .fault-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .fault-delete {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--danger);
    color: #fff;
    border: none;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
  }
  body.edit-mode .fault-delete { display: block; }

  .tag {
    display: inline-flex;
    align-items: center;
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag-warn { background: var(--tag-warn-bg); color: var(--tag-warn); }
  .tag-info { background: var(--tag-info-bg); color: var(--tag-info); }
  .tag-success { background: var(--tag-success-bg); color: var(--tag-success); }
  .tag-default { background: #f3f1ec; color: #57534e; }

  .add-fault-btn {
    display: none;
    width: 100%;
    padding: 14px;
    background: rgba(217, 119, 6, 0.08);
    color: var(--edit);
    border: 2px dashed var(--edit);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    margin-bottom: 9px;
  }
  .add-fault-btn:hover { background: rgba(217, 119, 6, 0.15); }
  body.edit-mode .add-fault-btn { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  /* ========== 详情区 ========== */
  .detail-pane {
    background: var(--bg-elevated);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .detail-header {
    padding: 32px 44px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .detail-overline {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .detail-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.015em;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .detail-tags .tag {
    font-size: 11.5px;
    padding: 3px 10px;
  }
  .tag-edit-btn {
    display: none;
    padding: 3px 8px;
    background: var(--edit-bg);
    color: var(--edit);
    border: 1px dashed var(--edit);
    border-radius: 4px;
    font-size: 10.5px;
    cursor: pointer;
    font-family: var(--font-body);
  }
  body.edit-mode .tag-edit-btn { display: inline-block; }
  body.edit-mode .tag {
    padding-right: 4px;
  }
  body.edit-mode .tag .tag-x {
    display: inline-block;
    margin-left: 4px;
    cursor: pointer;
    color: var(--danger);
    font-weight: 700;
  }
  .tag .tag-x { display: none; }

  .role-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 44px;
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .role-tab {
    padding: 13px 0;
    margin-right: 32px;
    cursor: pointer;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .role-tab:hover { color: var(--text); }
  .role-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .role-tab .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .role-tab[data-role="cs"] .dot { background: var(--role-cs); }
  .role-tab[data-role="fd"] .dot { background: var(--role-fd); }
  .role-tab[data-role="tech"] .dot { background: var(--role-tech); }
  .role-tab[data-role="parts"] .dot { background: var(--role-parts); }

  .detail-content {
    padding: 28px 44px 60px;
    flex: 1;
    overflow-y: auto;
  }
  .role-section h3 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    margin-top: 26px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .role-section h3:first-child { margin-top: 0; }
  .role-section h3 .indicator {
    width: 6px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  .speech-card {
    background: var(--role-cs-bg);
    border-left: 3px solid var(--role-cs);
    padding: 18px 22px;
    border-radius: 8px;
    margin-bottom: 14px;
    position: relative;
  }
  .speech-card::before {
    content: '\201C';
    position: absolute;
    top: -12px;
    left: 16px;
    font-family: var(--font-display);
    font-size: 52px;
    color: var(--role-cs);
    line-height: 1;
    opacity: 0.3;
  }
  .speech-text {
    font-size: 14.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    position: relative;
    z-index: 1;
  }

  .step-list, .question-list, .parts-list {
    list-style: none;
  }
  .step-list { counter-reset: step; }
  .step-list li {
    counter-increment: step;
    padding: 11px 16px 11px 46px;
    background: #fafaf7;
    border-radius: 8px;
    margin-bottom: 7px;
    position: relative;
    font-size: 13.5px;
    line-height: 1.6;
    border: 1px solid var(--border);
  }
  .step-list li::before {
    content: counter(step);
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    background: var(--role-fd);
    color: #fff;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-mono);
  }
  .role-section[data-role="tech"] .step-list li::before { background: var(--role-tech); }

  .question-list li {
    padding: 9px 14px 9px 32px;
    background: #fafaf7;
    border-radius: 7px;
    margin-bottom: 6px;
    position: relative;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .question-list li::before {
    content: '?';
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    background: var(--role-cs);
    color: #fff;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 700;
  }

  .parts-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .part-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--role-parts-bg);
    border: 1px solid #e9d5ff;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    position: relative;
  }
  .part-item::before {
    content: '\25C6';
    color: var(--role-parts);
    font-size: 12px;
  }

  .note-box {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-left: 3px solid #d97706;
    padding: 13px 18px;
    border-radius: 7px;
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.7;
    color: #78350f;
  }
  .note-box strong { font-weight: 700; }

  /* ========== 编辑模式：可编辑元素 ========== */
  body.edit-mode .editable {
    cursor: text;
    outline: 1px dashed transparent;
    transition: all .12s ease;
    border-radius: 4px;
    padding: 2px 6px;
    margin: -2px -6px;
    position: relative;
  }
  body.edit-mode .editable:hover {
    outline-color: var(--edit);
    background: var(--edit-bg);
  }
  body.edit-mode .editable:focus {
    outline: 2px solid var(--edit);
    background: #fffbeb;
  }
  body.edit-mode .speech-card .editable,
  body.edit-mode .note-box .editable {
    background: rgba(255,255,255,0.5);
  }
  body.edit-mode .speech-card .editable:focus,
  body.edit-mode .note-box .editable:focus {
    background: #fff;
  }

  /* 列表项 添加/删除按钮 */
  .list-item-controls {
    display: none;
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    gap: 4px;
  }
  body.edit-mode .step-list li,
  body.edit-mode .question-list li,
  body.edit-mode .part-item {
    padding-right: 70px;
  }
  body.edit-mode .list-item-controls { display: flex; }
  .li-btn {
    width: 22px; height: 22px;
    border: none;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
  .li-btn.up, .li-btn.down { background: #e7e5e0; color: var(--text); }
  .li-btn.del { background: var(--danger); color: #fff; }

  .add-list-item-btn {
    display: none;
    width: 100%;
    padding: 11px;
    background: var(--edit-bg);
    color: var(--edit);
    border: 1px dashed var(--edit);
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    font-family: var(--font-body);
  }
  .add-list-item-btn:hover { background: #fde68a; }
  body.edit-mode .add-list-item-btn { display: block; }

  .delete-fault-section {
    display: none;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  body.edit-mode .delete-fault-section { display: block; }
  .danger-btn {
    background: #fef2f2;
    color: var(--danger);
    border: 1px solid #fecaca;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12.5px;
    cursor: pointer;
    font-weight: 600;
    font-family: var(--font-body);
  }
  .danger-btn:hover { background: #fee2e2; }

  /* ========== 欢迎页 ========== */
  .welcome {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 40px;
    text-align: center;
  }
  .welcome-content { max-width: 460px; }
  .welcome-icon { font-size: 48px; margin-bottom: 18px; opacity: 0.6; }
  .welcome h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
  }
  .welcome .edit-hint {
    margin-top: 18px;
    padding: 14px 18px;
    background: var(--edit-bg);
    border-radius: 8px;
    color: var(--edit);
    font-size: 13px;
    text-align: left;
    border-left: 3px solid var(--edit);
  }

  /* ========== 模态对话框 ========== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28, 31, 42, 0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .modal label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    margin-top: 14px;
    margin-bottom: 6px;
    color: var(--text);
  }
  .modal input, .modal textarea, .modal select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-size: 13.5px;
    font-family: var(--font-body);
    background: #fff;
    color: var(--text);
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .modal textarea {
    min-height: 80px;
    resize: vertical;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 22px;
  }
  .modal-btn {
    padding: 9px 18px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .modal-btn.primary {
    background: var(--accent);
    color: #fff;
  }
  .modal-btn.primary:hover { background: var(--accent-deep); }
  .modal-btn.secondary {
    background: #f3f1ec;
    color: var(--text);
  }
  .modal-icon-picker {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    margin-top: 6px;
  }
  .modal-icon-option {
    padding: 8px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    background: #fff;
  }
  .modal-icon-option:hover { background: var(--accent-soft); border-color: var(--accent); }
  .modal-icon-option.selected { background: var(--accent-soft); border-color: var(--accent); }

  .modal-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ========== Toast 通知 ========== */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transform: translateY(20px);
    transition: all .25s ease;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #15803d; }
  .toast.error { background: var(--danger); }

  /* ========== 滚动条 ========== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
  .sidebar ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

  /* ========== 响应式 ========== */
  @media (max-width: 1100px) {
    .app { grid-template-columns: 240px 320px 1fr; }
    .detail-header { padding: 26px 30px 18px; }
    .role-tabs { padding: 0 30px; }
    .detail-content { padding: 24px 30px 50px; }
  }
  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      overflow: auto;
      height: auto;
    }
    body { overflow: auto; }
    .sidebar { max-height: 50vh; }
    .sidebar-header { padding: 18px 18px 12px; }
    .sidebar-title { font-size: 17px; }
    .fault-list-pane { max-height: 50vh; }
    .fault-list-header { padding: 18px 18px 10px; }
    .fault-list-title { font-size: 19px; }
    .detail-header { padding: 22px 18px 14px; }
    .detail-title { font-size: 20px; }
    .role-tabs { padding: 0 18px; overflow-x: auto; }
    .role-tab { margin-right: 22px; font-size: 12px; }
    .detail-content { padding: 22px 18px 40px; }
    .topbar { flex-wrap: wrap; height: auto; padding: 8px 12px; }
    .topbar-status { width: 100%; order: -1; margin-bottom: 4px; }
  }

  @media print {
    .topbar, .sidebar, .fault-list-pane, .role-tabs,
    .add-fault-btn, .add-category-btn, .add-list-item-btn,
    .fault-delete, .category-delete, .list-item-controls,
    .tag-edit-btn, .delete-fault-section { display: none !important; }
    .app { display: block; height: auto; }
    .detail-pane { overflow: visible; }
    body { background: #fff; overflow: visible; }
  }

  /* ========================================================== */
  /*  招聘技术员 — 面试试卷场景专属 UI                            */
  /* ========================================================== */
  .quiz-app {
    display: none;
    height: calc(100vh - 44px);
    overflow-y: auto;
    background: #F0F3F7;
    font-family: "PingFang SC", "Microsoft YaHei", var(--font-body);
    color: #1A252F;
  }
  body[data-scene="quiz"] .app { display: none; }
  body[data-scene="quiz"] .quiz-app { display: block; }

  /* Quiz 颜色变量（用紫色系替代原版蓝色，与场景主题一致） */
  .quiz-app, .records-overlay {
    --q-blue: #7c3aed;
    --q-blue2: #6d28d9;
    --q-blue-lt: #f3effe;
    --q-green: #1D8348;
    --q-green-lt: #D5F5E3;
    --q-red: #C0392B;
    --q-red-lt: #FADBD8;
    --q-amber: #D68910;
    --q-amber-lt: #FEF9E7;
    --q-gray: #F4F6F7;
    --q-border: #D5D8DC;
    --q-text: #1A252F;
    --q-muted: #7F8C8D;
  }

  .quiz-hd {
    background: linear-gradient(135deg, var(--q-blue), var(--q-blue2));
    color: #fff;
    padding: 28px 0 22px;
    text-align: center;
  }
  .quiz-hd h1 { font-size: 22px; font-weight: 700; letter-spacing: .5px; }
  .quiz-hd p { font-size: 13px; opacity: .85; margin-top: 5px; }
  .quiz-prog-bg { height: 5px; background: rgba(255,255,255,.25); margin-top: 18px; }
  .quiz-prog-fill { height: 5px; background: #fff; border-radius: 2px; transition: width .35s; width: 0%; }

  .quiz-wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  .quiz-info {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    padding: 20px;
    margin: 20px 0 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .quiz-info label {
    font-size: 11px;
    color: var(--q-muted);
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
    letter-spacing: .3px;
  }
  .quiz-info input {
    width: 100%;
    border: 1.5px solid var(--q-border);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
    background: #fff;
    color: var(--q-text);
  }
  .quiz-info input:focus { border-color: var(--q-blue2); }

  .quiz-sec-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--q-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 28px 0 10px;
    padding-left: 2px;
  }

  .qcard {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    margin-bottom: 14px;
    overflow: hidden;
    border: 1.5px solid transparent;
    transition: border-color .2s;
  }
  .qcard.done { border-color: var(--q-border); }
  .qcard.unanswered { border-color: var(--q-red) !important; animation: qshake .3s; }
  @keyframes qshake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .qhead {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 13px 16px 11px;
    border-bottom: 1px solid var(--q-gray);
  }
  .qnum {
    background: var(--q-blue);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .qtag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .t-easy { background: var(--q-blue-lt); color: var(--q-blue); }
  .t-mid { background: var(--q-amber-lt); color: var(--q-amber); }
  .t-hard { background: var(--q-red-lt); color: var(--q-red); }
  .qscore {
    margin-left: auto;
    font-size: 11px;
    color: var(--q-muted);
    font-weight: 500;
  }

  .qscene {
    font-size: 13px;
    color: #34495E;
    line-height: 1.75;
    background: var(--q-blue-lt);
    border-left: 3px solid var(--q-blue2);
    padding: 12px 14px;
    margin: 14px 16px 0;
    border-radius: 0 7px 7px 0;
    white-space: pre-wrap;
  }
  .qask {
    font-size: 15px;
    font-weight: 600;
    padding: 14px 16px 10px;
    line-height: 1.5;
  }

  .opts {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 14px;
    border: 1.5px solid var(--q-border);
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    line-height: 1.55;
    user-select: none;
    background: #fff;
  }
  .opt:hover { background: var(--q-gray); border-color: #B2BEC3; }
  .opt-letter {
    width: 26px; height: 26px;
    border: 2px solid var(--q-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--q-muted);
    flex-shrink: 0;
    transition: all .2s;
  }
  .opt.sel .opt-letter {
    border-color: var(--q-blue2);
    background: var(--q-blue2);
    color: #fff;
  }
  .opt.sel {
    border-color: var(--q-blue2);
    background: #f3effe;
  }
  /* 编辑模式下：隐藏候选人信息、提交/重置按钮、评分汇总 */
  body.edit-mode .quiz-app .quiz-info,
  body.edit-mode .quiz-app .sub-wrap,
  body.edit-mode .quiz-app .summary,
  body.edit-mode .quiz-app .quiz-sec-title:last-of-type {
    display: none;
  }
  body.edit-mode .quiz-app .quiz-prog-bg {
    display: none;
  }

  .opt-text { font-size: 13.5px; padding-top: 2px; flex: 1; }

  /* ===== Quiz 编辑模式样式 ===== */
  body.edit-mode .quiz-app .qtag,
  body.edit-mode .quiz-app .qscene,
  body.edit-mode .quiz-app .qask {
    outline: 1px dashed transparent;
    transition: outline-color .15s, background .15s;
    cursor: text;
  }
  body.edit-mode .quiz-app .qtag:hover,
  body.edit-mode .quiz-app .qscene:hover,
  body.edit-mode .quiz-app .qask:hover {
    outline-color: var(--q-blue);
    background: rgba(124, 58, 237, 0.05);
  }
  body.edit-mode .quiz-app .qtag:focus,
  body.edit-mode .quiz-app .qscene:focus,
  body.edit-mode .quiz-app .qask:focus {
    outline: 2px solid var(--q-blue);
    background: rgba(124, 58, 237, 0.08);
  }
  body.edit-mode .quiz-app .opt-text {
    outline: 1px dashed transparent;
    border-radius: 4px;
    padding: 2px 6px;
    transition: outline-color .15s, background .15s;
    cursor: text;
  }
  body.edit-mode .quiz-app .opt-text:hover {
    outline-color: var(--q-blue);
    background: rgba(124, 58, 237, 0.05);
  }
  body.edit-mode .quiz-app .opt-text:focus {
    outline: 2px solid var(--q-blue);
    background: rgba(124, 58, 237, 0.08);
  }
  body.edit-mode .quiz-app .opt {
    cursor: default;
  }
  body.edit-mode .quiz-app .opt:hover {
    background: #fff;
    border-color: var(--q-border);
  }
  body.edit-mode .quiz-app .opt-correct-edit {
    border-color: var(--q-green) !important;
    background: var(--q-green-lt) !important;
  }
  /* 正确答案切换按钮 */
  .opt-mark {
    background: #fff;
    color: var(--q-muted);
    border: 1.5px solid var(--q-border);
    border-radius: 16px;
    padding: 3px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all .12s ease;
  }
  .opt-mark:hover {
    background: var(--q-blue-lt);
    color: var(--q-blue2);
    border-color: var(--q-blue2);
  }
  .opt-mark.is-correct {
    background: var(--q-green);
    color: #fff;
    border-color: var(--q-green);
  }
  .opt-mark.is-correct:hover {
    background: #14532d;
    border-color: #14532d;
  }

  .open-wrap { padding: 0 16px 16px; }
  .open-wrap textarea {
    width: 100%;
    min-height: 110px;
    border: 1.5px solid var(--q-border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13.5px;
    font-family: inherit;
    line-height: 1.65;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
    background: #fff;
    color: var(--q-text);
  }
  .open-wrap textarea:focus { border-color: var(--q-blue2); }
  .open-note { font-size: 11px; color: var(--q-red); margin-top: 6px; }

  .sub-wrap { text-align: center; margin-top: 28px; }
  .btn-sub {
    background: linear-gradient(135deg, var(--q-blue), var(--q-blue2));
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 52px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(124, 58, 237, .3);
    transition: opacity .2s, transform .15s;
    letter-spacing: .3px;
    font-family: inherit;
  }
  .btn-sub:hover { opacity: .9; transform: translateY(-1px); }
  .btn-sub:disabled { opacity: .45; cursor: default; transform: none; }
  .quiz-warn {
    color: var(--q-red);
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .quiz-warn.show { display: block; }

  .btn-reset {
    margin-left: 8px;
    background: #fff;
    color: var(--q-muted);
    border: 1.5px solid var(--q-border);
    border-radius: 50px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-reset:hover {
    background: var(--q-gray);
    border-color: var(--q-muted);
  }

  .summary {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    overflow: hidden;
    margin-top: 0;
  }
  .sum-hd {
    background: linear-gradient(135deg, var(--q-blue), var(--q-blue2));
    color: #fff;
    padding: 16px 20px;
  }
  .sum-hd h2 { font-size: 16px; font-weight: 700; }
  .sum-hd p { font-size: 12px; opacity: .85; margin-top: 3px; }

  table.sum-tbl { width: 100%; border-collapse: collapse; }
  table.sum-tbl th {
    background: var(--q-blue-lt);
    color: var(--q-blue);
    font-size: 12px;
    font-weight: 700;
    padding: 10px 12px;
    text-align: center;
    border-bottom: 2px solid #ddd6fe;
  }
  table.sum-tbl th:nth-child(2) { text-align: left; }
  table.sum-tbl td {
    padding: 9px 12px;
    font-size: 13px;
    border-bottom: 1px solid var(--q-gray);
    text-align: center;
    vertical-align: middle;
  }
  table.sum-tbl td:nth-child(2) { text-align: left; }
  table.sum-tbl tr:last-child td { border-bottom: none; }
  table.sum-tbl tr:nth-child(even) { background: #FAFBFC; }

  .ans-cell {
    font-size: 15px;
    font-weight: 700;
    color: var(--q-muted);
  }
  .ans-cell.filled { color: var(--q-blue); }
  .correct-ans-cell {
    font-size: 14px;
    font-weight: 700;
    color: var(--q-green);
    letter-spacing: 0.5px;
  }

const RATE_STORAGE_KEY = 'repair_db_v3_rate';

/* ============================================================
   汇率换算
   ============================================================ */
function formatSgd(sgd) {
  if (sgd >= 100) return `S$${Math.round(sgd)}`;
  return `S$${sgd.toFixed(1)}`;
}

// 把字符串里的 ¥xxx 实时替换为 S$yyy (¥xxx)
function convertPrice(text) {
  if (typeof text !== 'string') return text;
  const rate = state.rateRmbToSgd || 5.3;
  return text.replace(/¥(\d+(?:\.\d+)?)/g, (match, num) => {
    const rmb = parseFloat(num);
    const sgd = rmb / rate;
    return `${formatSgd(sgd)} (¥${num})`;
  });
}

// 简化版：只显示 SGD（用于较紧凑的场景，如客服话术段落）
function convertPriceSimple(text) {
  if (typeof text !== 'string') return text;
  const rate = state.rateRmbToSgd || 5.3;
  return text.replace(/¥(\d+(?:\.\d+)?)/g, (match, num) => {
    const rmb = parseFloat(num);
    const sgd = rmb / rate;
    return formatSgd(sgd);
  });
}

function loadRate() {
  try {
    const r = parseFloat(localStorage.getItem(RATE_STORAGE_KEY));
    if (r && r > 0 && r < 100) state.rateRmbToSgd = r;
  } catch(e) {}
}
function saveRate() {
  try { localStorage.setItem(RATE_STORAGE_KEY, String(state.rateRmbToSgd)); }
  catch(e) {}
}

function storageKey() {
  return 'repair_db_v3_' + state.scene;
}

function sceneLabel() {
  if (state.scene === 'offline') return '线下话术';
  if (state.scene === 'online') return '线上客服';
  if (state.scene === 'mac') return 'Mac 配件报价';
  if (state.scene === 'quiz') return '招聘技术员';
  return state.scene;
}

function $(sel) { return document.querySelector(sel); }

function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   持久化
   ============================================================ */
function saveData() {
  try {
    showStatus('saving', '保存中…');
    localStorage.setItem(storageKey(), JSON.stringify(REPAIR_DATA));
    setTimeout(() => showStatus('saved', sceneLabel() + ' · 已保存到本地'), 300);
  } catch(e) {
    showStatus('error', '保存失败');
    console.error(e);
  }
}
function loadData() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) {
      REPAIR_DATA = JSON.parse(raw);
      return true;
    }
  } catch(e) { console.error(e); }
  // 没有保存的数据，从 DEFAULT_DATA 加载当前场景
  REPAIR_DATA = deepClone(DEFAULT_DATA[state.scene] || DEFAULT_DATA);
  return false;
}
function showStatus(state, text) {
  const status = $('.topbar-status');
  status.classList.remove('saving', 'error');
  if (state === 'saving') status.classList.add('saving');
  if (state === 'error') status.classList.add('error');
  $('#statusText').textContent = text;
}

/* ============================================================
   场景切换
   ============================================================ */
function switchScene(newScene) {
  if (newScene === state.scene) return;
  state.scene = newScene;
  state.categoryId = null;
  state.faultId = null;
  state.role = 'cs';
  state.search = '';
  state.editMode = false;
  document.body.classList.remove('edit-mode');
  document.body.setAttribute('data-scene', newScene);

  // 更新顶部场景按钮状态
  $$('.scene-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.scene === newScene);
  });

  // Mac 场景显示汇率输入框
  const rateBox = $('#rateBox');
  if (rateBox) {
    rateBox.style.display = newScene === 'mac' ? 'inline-flex' : 'none';
  }

  // quiz 场景隐藏编辑按钮等（暂时不支持编辑试卷）
  const editBtn = $('#editBtn');
  editBtn.textContent = '✎ 进入编辑模式';
  editBtn.classList.remove('edit-on');
  editBtn.classList.add('primary');
  editBtn.style.display = '';

  if ($('#searchInput')) $('#searchInput').value = '';

  if (newScene === 'quiz') {
    // 招聘技术员场景：渲染试卷
    renderQuiz();
    showStatus('saved', sceneLabel() + ' · 已就绪');
    toast(`已切换到「${sceneLabel()}」`, 'success');
    return;
  }

  loadData();

  renderCategories();
  renderFaultList();
  renderDetail();
  showStatus('saved', sceneLabel() + ' · 已就绪');
  toast(`已切换到「${sceneLabel()}」`, 'success');
}

/* ============================================================
   Toast
   ============================================================ */
function toast(msg, type='') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ============================================================
   模态对话框
   ============================================================ */
function modal({ title, html, onSave, saveLabel = '保存', size = 'normal' }) {
  const m = $('#modal');
  const c = $('#modalContent');
  c.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' + html +
    '<div class="modal-actions">' +
    '<button class="modal-btn secondary" id="modalCancel">取消</button>' +
    '<button class="modal-btn primary" id="modalOk">' + escapeHtml(saveLabel) + '</button>' +
    '</div>';
  m.classList.add('show');
  $('#modalCancel').onclick = () => m.classList.remove('show');
  $('#modalOk').onclick = () => {
    try {
      const result = onSave();
      if (result !== false) m.classList.remove('show');
    } catch(e) { toast(e.message || '保存失败', 'error'); }
  };
  m.onclick = (e) => { if (e.target === m) m.classList.remove('show'); };
}

/* ============================================================
   统计
   ============================================================ */
function getTotalFaults() {
  return REPAIR_DATA.categories.reduce((sum, c) => sum + c.faults.length, 0);
}

/* ============================================================
   渲染分类列表
   ============================================================ */
function renderCategories() {
  const list = $('#categoryList');
  list.innerHTML = '';
  REPAIR_DATA.categories.forEach(cat => {
    const item = el('div', {
      class: 'category-item' + (state.categoryId === cat.id ? ' active' : ''),
      'data-id': cat.id,
      onclick: (e) => {
        if (e.target.closest('.category-edit, .category-delete')) return;
        selectCategory(cat.id);
      }
    }, [
      el('div', {
        class: 'category-icon',
        title: state.editMode ? '点击修改图标' : '',
        onclick: (ev) => {
          if (!state.editMode) return;
          ev.stopPropagation();
          editCategoryIcon(cat.id);
        }
      }, [cat.icon || '🔧']),
      el('span', { class: 'category-name' }, [cat.name]),
      el('span', { class: 'category-count' }, [String(cat.faults.length)]),
      el('span', {
        class: 'category-edit',
        title: '重命名',
        onclick: (ev) => {
          ev.stopPropagation();
          renameCategory(cat.id);
        }
      }, ['✎']),
      el('span', {
        class: 'category-delete',
        title: '删除此分类',
        onclick: (ev) => {
          ev.stopPropagation();
          confirmDeleteCategory(cat.id);
        }
      }, ['×'])
    ]);
    list.appendChild(item);
  });
  $('#catCount').textContent = REPAIR_DATA.categories.length;
  $('#totalFaultsLabel').textContent = getTotalFaults() + ' 条';
}

/* ============================================================
   渲染故障列表
   ============================================================ */
function renderFaultList() {
  const list = $('#faultList');
  list.innerHTML = '';

  // 全局搜索
  if (state.search) {
    const matches = [];
    REPAIR_DATA.categories.forEach(cat => {
      cat.faults.forEach(f => {
        if (matchesSearch(f, state.search)) matches.push({ cat, fault: f });
      });
    });
    $('#breadcrumb').textContent = 'SEARCH RESULTS';
    $('#categoryTitle').textContent = `搜索 "${state.search}" · ${matches.length} 项`;
    if (matches.length === 0) {
      list.appendChild(el('div', { class: 'empty-state' }, [
        el('div', { class: 'empty-icon' }, ['🔍']),
        el('div', {}, ['无匹配结果'])
      ]));
      return;
    }
    matches.forEach(({ cat, fault }) => {
      list.appendChild(buildFaultCard(cat, fault, true));
    });
    return;
  }

  const cat = REPAIR_DATA.categories.find(c => c.id === state.categoryId);
  if (!cat) {
    $('#breadcrumb').textContent = 'FAULT CATEGORY';
    $('#categoryTitle').textContent = '选择故障类别';
    list.appendChild(el('div', { class: 'empty-state' }, [
      el('div', { class: 'empty-icon' }, ['👈']),
      el('div', {}, ['请从左侧选择一个故障类别'])
    ]));
    return;
  }
  $('#breadcrumb').textContent = (cat.id || '').toUpperCase().replace(/_/g, ' · ');
  $('#categoryTitle').textContent = cat.name;

  cat.faults.forEach(fault => list.appendChild(buildFaultCard(cat, fault, false)));

  // 新增故障按钮（编辑模式）
  const addBtn = el('button', {
    class: 'add-fault-btn',
    onclick: () => addFault(cat.id)
  }, ['+ 新增故障案例']);
  list.appendChild(addBtn);
}

function buildFaultCard(cat, fault, showCat) {
  const card = el('div', {
    class: 'fault-card' + (state.faultId === fault.id ? ' active' : ''),
    onclick: (e) => {
      if (e.target.classList.contains('fault-delete')) return;
      state.categoryId = cat.id;
      state.faultId = fault.id;
      state.role = 'cs';
      renderCategories();
      renderFaultList();
      renderDetail();
    }
  }, []);

  if (showCat) {
    card.appendChild(el('span', { class: 'fault-cat-label' }, [(cat.icon || '🔧') + ' ' + cat.name]));
  }

  card.appendChild(el('div', { class: 'fault-symptom' }, [fault.symptom]));
  card.appendChild(renderTagList(fault.tags || [], 'fault-tags', false));

  // 删除按钮
  card.appendChild(el('button', {
    class: 'fault-delete',
    title: '删除此故障',
    onclick: (ev) => {
      ev.stopPropagation();
      if (confirm(`确定删除故障"${fault.symptom}"？此操作不可撤销。`)) {
        cat.faults = cat.faults.filter(f => f.id !== fault.id);
        if (state.faultId === fault.id) state.faultId = null;
        saveData();
        renderCategories();
        renderFaultList();
        renderDetail();
        toast('已删除', 'success');
      }
    }
  }, ['×']));

  return card;
}

function renderTagList(tags, className, editable) {
  const wrap = el('div', { class: className });
  tags.forEach((t, i) => {
    const tagEl = el('span', { class: 'tag ' + tagClass(t) }, [t]);
    if (editable) {
      tagEl.appendChild(el('span', { class: 'tag-x', onclick: (ev) => {
        ev.stopPropagation();
        removeTag(i);
      } }, ['×']));
    }
    wrap.appendChild(tagEl);
  });
  return wrap;
}

function matchesSearch(fault, q) {
  q = q.toLowerCase();
  const blobs = [
    fault.symptom,
    fault.customerService || '',
    fault.note || '',
    ...(fault.customerAsk || []),
    ...(fault.frontDeskDiag || []),
    ...(fault.techProcess || []),
    ...(fault.parts || []),
    ...(fault.tags || [])
  ];
  // Mac 场景同时匹配换算后的 SGD 文本
  if (state.scene === 'mac') {
    const allBlobs = blobs.concat(blobs.map(b => convertPrice(String(b))));
    return allBlobs.some(b => String(b).toLowerCase().includes(q));
  }
  return blobs.some(b => String(b).toLowerCase().includes(q));
}

/* ============================================================
   渲染详情
   ============================================================ */
function renderDetail() {
  const pane = $('#detailPane');
  pane.innerHTML = '';

  if (!state.faultId) {
    pane.appendChild(buildWelcome());
    return;
  }

  const cat = REPAIR_DATA.categories.find(c => c.id === state.categoryId);
  if (!cat) return;
  const fault = cat.faults.find(f => f.id === state.faultId);
  if (!fault) {
    state.faultId = null;
    renderDetail();
    return;
  }

  // Header
  const header = el('div', { class: 'detail-header' });
  header.appendChild(el('div', { class: 'detail-overline' },
    [cat.name + ' · ' + (fault.id || '').toUpperCase().replace(/_/g, ' ')]));

  header.appendChild(el('h1', {
    class: 'detail-title editable',
    contenteditable: state.editMode ? 'true' : 'false',
    onblur: (e) => { fault.symptom = e.target.textContent.trim() || fault.symptom; saveData(); renderFaultList(); }
  }, [fault.symptom]));

  // 标签编辑
  const tagsRow = el('div', { class: 'detail-tags' });
  (fault.tags || []).forEach((t, i) => {
    const tagEl = el('span', { class: 'tag ' + tagClass(t) }, [t]);
    if (state.editMode) {
      tagEl.appendChild(el('span', { class: 'tag-x', onclick: () => {
        fault.tags.splice(i, 1);
        saveData();
        renderDetail();
        renderFaultList();
      } }, ['×']));
    }
    tagsRow.appendChild(tagEl);
  });
  if (state.editMode) {
    tagsRow.appendChild(el('button', {
      class: 'tag-edit-btn',
      onclick: () => addTag(fault)
    }, ['+ 标签']));
  }
  header.appendChild(tagsRow);
  pane.appendChild(header);

  // Tabs
  const tabsWrap = el('div', { class: 'role-tabs' });
  const roles = state.scene === 'mac' ? [
    { id: 'cs', name: '机型概览' },
    { id: 'fd', name: '主要配件' },
    { id: 'tech', name: '次要配件' },
    { id: 'parts', name: '完整报价' }
  ] : state.scene === 'online' ? [
    { id: 'cs', name: '客服话术' },
    { id: 'fd', name: '远程引导' },
    { id: 'tech', name: '内部参考' },
    { id: 'parts', name: '可能订货' }
  ] : [
    { id: 'cs', name: '客服话术' },
    { id: 'fd', name: '前台诊断' },
    { id: 'tech', name: '技术员处理' },
    { id: 'parts', name: '订货清单' }
  ];
  roles.forEach(r => {
    tabsWrap.appendChild(el('div', {
      class: 'role-tab' + (state.role === r.id ? ' active' : ''),
      'data-role': r.id,
      onclick: () => { state.role = r.id; renderDetail(); }
    }, [
      el('span', { class: 'dot' }),
      el('span', {}, [r.name])
    ]));
  });
  pane.appendChild(tabsWrap);

  // Content
  const content = el('div', { class: 'detail-content' });
  content.appendChild(renderRoleSection(state.role, fault));

  // 注意事项
  const noteWrap = el('div', {});
  if (fault.note || state.editMode) {
    const noteBox = el('div', { class: 'note-box' });
    noteBox.appendChild(el('strong', {}, ['⚠️ 注意事项：']));
    noteBox.appendChild(el('span', {
      class: 'editable',
      contenteditable: state.editMode ? 'true' : 'false',
      'data-placeholder': '点击添加注意事项…',
      onblur: (e) => { fault.note = e.target.textContent.trim(); saveData(); }
    }, [' ' + (fault.note || (state.editMode ? '(点此添加注意事项)' : ''))]));
    noteWrap.appendChild(noteBox);
  }
  content.appendChild(noteWrap);

  // 删除整个故障按钮（编辑模式）
  if (state.editMode) {
    const del = el('div', { class: 'delete-fault-section' });
    del.appendChild(el('button', {
      class: 'danger-btn',
      onclick: () => {
        if (confirm(`确定删除整个故障"${fault.symptom}"？`)) {
          cat.faults = cat.faults.filter(f => f.id !== fault.id);
          state.faultId = null;
          saveData();
          renderCategories();
          renderFaultList();
          renderDetail();
          toast('已删除故障', 'success');
        }
      }
    }, ['🗑 删除整个故障']));
    content.appendChild(del);
  }

  pane.appendChild(content);
}

  const isMac = state.scene === 'mac';
  let sceneTitle, sceneDesc, sceneIcon;
  if (isMac) {
    sceneTitle = 'Mac 配件报价查询';
    sceneDesc = '从左侧选择 <strong>MacBook Pro / MacBook Air</strong> → 选择具体机型 → 查看该机型所有配件的报价。<br><br>📌 4 个 Tab 按配件重要程度分组：机型概览 · 主要配件 · 次要配件 · 完整报价。';
    sceneIcon = '💻';
  } else if (isOnline) {
    sceneTitle = '线上客服话术指南';
    sceneDesc = '从左侧选择故障类别 → 选择具体故障 → 查看<strong>客服话术、远程引导、技术参考、可能订货</strong>。<br><br>📌 线上客服核心目标：通过引导客户预约门店检测维修。';
    sceneIcon = '💬';
  } else {
    sceneTitle = '线下话术与诊断指南';
    sceneDesc = '从左侧选择故障类别 → 选择具体故障 → 查看<strong>客服话术、前台诊断、技术员处理、订货清单</strong>四个角色的标准流程。';
    sceneIcon = '🔧';
  }

  const content = el('div', { class: 'welcome-content' }, [
    el('div', { class: 'welcome-icon' }, [sceneIcon]),
    el('h2', {}, [sceneTitle]),
    el('p', { html: sceneDesc })
  ]);
  if (state.editMode) {
    content.appendChild(el('div', { class: 'edit-hint', html:
      '<strong>✎ 编辑模式已开启</strong><br>• 点击任何文字直接修改<br>• 鼠标悬停在故障/分类上会显示删除 ×<br>• 改完后点 <strong>导出 HTML</strong> 下载新版本' }));
  } else {
    content.appendChild(el('div', { class: 'edit-hint', style: 'background:#f3f1ec;color:var(--text-muted);border-left-color:var(--text-muted);',
      html: '💡 提示：顶部可切换<strong>线下话术 / 线上客服 / Mac 配件报价 / 招聘技术员</strong>四个场景。点击右上角 <strong>"进入编辑模式"</strong> 可直接修改文字、新增内容。' }));
  }
  w.appendChild(content);
  return w;
}

function renderRoleSection(role, fault) {
  const sec = el('div', { class: 'role-section', 'data-role': role });

  if (role === 'cs') {
    const csLabel = state.scene === 'mac' ? '机型详细信息' : '标准话术（对客户说）';
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), csLabel]));
    const csValue = fault.customerService || (state.editMode ? '(点此输入话术)' : '— 无标准话术 —');
    const csDisplay = (state.scene === 'mac' && !state.editMode) ? convertPrice(csValue) : csValue;
    sec.appendChild(el('div', { class: 'speech-card' }, [
      el('div', {
        class: 'speech-text editable',
        contenteditable: state.editMode ? 'true' : 'false',
        onblur: (e) => { fault.customerService = e.target.textContent.trim(); saveData(); }
      }, [csDisplay])
    ]));

    if (!fault.customerAsk) fault.customerAsk = [];
    if (fault.customerAsk.length > 0 || state.editMode) {
      const askLabel = state.scene === 'mac' ? '核心配件报价' : '需要询问客户';
      sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), askLabel]));
      const ul = el('ul', { class: 'question-list' });
      fault.customerAsk.forEach((q, i) => {
        ul.appendChild(buildListItem(q, i, fault.customerAsk, 'question'));
      });
      sec.appendChild(ul);
      if (state.editMode) {
        sec.appendChild(el('button', {
          class: 'add-list-item-btn',
          onclick: () => { fault.customerAsk.push('新问题'); saveData(); renderDetail(); }
        }, ['+ 添加询问问题']));
      }
    }
  } else if (role === 'fd') {
    // 各场景标签
    const fdLabel = state.scene === 'mac' ? '主要配件报价'
                   : state.scene === 'online' ? '远程引导客户'
                   : '前台诊断步骤';
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), fdLabel]));
    const ul = el('ul', { class: 'step-list' });
    if (!fault.frontDeskDiag) fault.frontDeskDiag = [];
    fault.frontDeskDiag.forEach((s, i) => {
      ul.appendChild(buildListItem(s, i, fault.frontDeskDiag, 'step'));
    });
    sec.appendChild(ul);
    if (fault.frontDeskDiag.length === 0 && !state.editMode) {
      const emptyMsg = state.scene === 'mac'
        ? '— 暂无主要配件数据 —'
        : state.scene === 'online'
        ? '— 此故障线上客服无需远程引导步骤，直接走客服话术 —'
        : '— 此故障前台无需独立诊断步骤 —';
      sec.appendChild(el('p', { html: `<span style="color:var(--text-muted)">${emptyMsg}</span>` }));
    }
    if (state.editMode) {
      const addLabel = state.scene === 'mac' ? '+ 添加配件'
                      : state.scene === 'online' ? '+ 添加远程引导步骤'
                      : '+ 添加诊断步骤';
      sec.appendChild(el('button', {
        class: 'add-list-item-btn',
        onclick: () => { fault.frontDeskDiag.push(state.scene === 'mac' ? '新配件 — S$0' : (state.scene === 'online' ? '新引导步骤' : '新步骤')); saveData(); renderDetail(); }
      }, [addLabel]));
    }
  } else if (role === 'tech') {
    const techLabel = state.scene === 'mac' ? '次要配件报价'
                     : state.scene === 'online' ? '技术参考（内部知识）'
                     : '技术员处理流程';
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), techLabel]));
    const ul = el('ul', { class: 'step-list' });
    if (!fault.techProcess) fault.techProcess = [];
    fault.techProcess.forEach((s, i) => {
      ul.appendChild(buildListItem(s, i, fault.techProcess, 'step'));
    });
    sec.appendChild(ul);
    if (fault.techProcess.length === 0 && !state.editMode) {
      const emptyMsg = state.scene === 'mac'
        ? '— 暂无次要配件数据 —'
        : state.scene === 'online'
        ? '— 线上客服无需了解技术细节，必要时切到"线下话术"场景查看 —'
        : '— 配件代换测试即可 —';
      sec.appendChild(el('p', { html: `<span style="color:var(--text-muted)">${emptyMsg}</span>` }));
    }
    if (state.editMode) {
      const addLabel = state.scene === 'mac' ? '+ 添加次要配件' : '+ 添加技术流程';
      sec.appendChild(el('button', {
        class: 'add-list-item-btn',
        onclick: () => { fault.techProcess.push(state.scene === 'mac' ? '新配件 — S$0' : '新流程'); saveData(); renderDetail(); }
      }, [addLabel]));
    }
  } else if (role === 'parts') {
    const partsLabel = state.scene === 'mac' ? '完整配件报价（按价格排序）' : '可能订购的配件';
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), partsLabel]));
    const list = el('div', { class: 'parts-list' });
    if (!fault.parts) fault.parts = [];
    fault.parts.forEach((p, i) => {
      list.appendChild(buildListItem(p, i, fault.parts, 'part'));
    });
    sec.appendChild(list);
    if (fault.parts.length === 0 && !state.editMode) {
      sec.appendChild(el('p', { html: '<span style="color:var(--text-muted)">— 此故障无需订货 —</span>' }));
    }
    if (state.editMode) {
      const addLabel = state.scene === 'mac' ? '+ 添加配件报价' : '+ 添加配件';
      sec.appendChild(el('button', {
        class: 'add-list-item-btn',
        onclick: () => { fault.parts.push(state.scene === 'mac' ? '新配件：S$0' : '新配件'); saveData(); renderDetail(); }
      }, [addLabel]));
    }
  }
  return sec;
}

function buildListItem(value, index, array, type) {
  const tag = (type === 'part') ? 'div' : 'li';
  const cls = (type === 'part') ? 'part-item' : (type === 'step' ? '' : '');
  const item = el(tag, { class: cls });

  // Mac 场景：非编辑模式实时换算价格；编辑模式显示原始 ¥
  const displayValue = (state.scene === 'mac' && !state.editMode)
    ? convertPrice(value)
    : value;

  const text = el('span', {
    class: 'editable',
    contenteditable: state.editMode ? 'true' : 'false',
    onblur: (e) => {
      const v = e.target.textContent.trim();
      if (v) { array[index] = v; saveData(); }
      else if (confirm('删除这一项？')) {
        array.splice(index, 1); saveData(); renderDetail();
      } else {
        e.target.textContent = array[index];
      }
    }
  }, [displayValue]);
  item.appendChild(text);

  // 控制按钮
  if (state.editMode) {
    const controls = el('div', { class: 'list-item-controls' }, [
      el('button', {
        class: 'li-btn up', title: '上移',
        onclick: (ev) => {
          ev.stopPropagation();
          if (index > 0) {
            [array[index-1], array[index]] = [array[index], array[index-1]];
            saveData(); renderDetail();
          }
        }
      }, ['↑']),
      el('button', {
        class: 'li-btn down', title: '下移',
        onclick: (ev) => {
          ev.stopPropagation();
          if (index < array.length - 1) {
            [array[index+1], array[index]] = [array[index], array[index+1]];
            saveData(); renderDetail();
          }
        }
      }, ['↓']),
      el('button', {
        class: 'li-btn del', title: '删除',
        onclick: (ev) => {
          ev.stopPropagation();
          array.splice(index, 1); saveData(); renderDetail();
        }
      }, ['×'])
    ]);
    item.appendChild(controls);
  }

  return item;
}

   ============================================================ */
function exportHTML() {
  // 处理 3 个故障场景
  if (state.scene !== 'quiz') saveData();
  const collected = {};
  ['offline', 'online', 'mac'].forEach(scene => {
    if (scene === state.scene) {
      collected[scene] = REPAIR_DATA;
    } else {
      const raw = localStorage.getItem('repair_db_v3_' + scene);
      if (raw) {
        try { collected[scene] = JSON.parse(raw); }
        catch(e) { collected[scene] = DEFAULT_DATA[scene]; }
      } else {
        collected[scene] = DEFAULT_DATA[scene];
      }
    }
  });

  // 同时处理 quiz 场景的数据
  let currentQuiz = null;
  if (state.scene === 'quiz' && QUIZ_DATA) {
    saveQuizData();
    currentQuiz = QUIZ_DATA;
  } else {
    const rawQ = localStorage.getItem(QUIZ_DATA_KEY);
    if (rawQ) {
      try { currentQuiz = JSON.parse(rawQ); }
      catch(e) {}
    }
  }

  const dataStr = JSON.stringify(collected, null, 2);
  let fullHTML = document.documentElement.outerHTML;

  // 替换 DEFAULT_DATA
  const marker = 'const DEFAULT_DATA = ';
  const idx = fullHTML.indexOf(marker);
  if (idx === -1) {
    toast('导出失败：找不到数据标记', 'error');
    return;
  }
  const before = fullHTML.substring(0, idx + marker.length);
  const after = fullHTML.substring(idx + marker.length);
  const endIdx = after.indexOf(';');
  const tail = after.substring(endIdx);
  fullHTML = before + dataStr + tail;

  // 如有 quiz 修改，替换 QUIZ_DEFAULT
  if (currentQuiz) {
    const quizMarker = 'const QUIZ_DEFAULT = ';
    const qIdx = fullHTML.indexOf(quizMarker);
    if (qIdx !== -1) {
      const qBefore = fullHTML.substring(0, qIdx + quizMarker.length);
      const qAfter = fullHTML.substring(qIdx + quizMarker.length);
      const qEndIdx = qAfter.indexOf(';');
      const qTail = qAfter.substring(qEndIdx);
      fullHTML = qBefore + JSON.stringify(currentQuiz, null, 2) + qTail;
    }
  }

  const newHTML = '<!DOCTYPE html>\n' + fullHTML;

  const blob = new Blob([newHTML], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `维修话术查询系统_${stamp}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('已下载最新版本 HTML（含全部 4 个场景）', 'success');
}

function loadQuizData() {
  try {
    const raw = localStorage.getItem(QUIZ_DATA_KEY);
    if (raw) {
      QUIZ_DATA = JSON.parse(raw);
      // 兼容性检查
      if (QUIZ_DATA && Array.isArray(QUIZ_DATA.questions) && QUIZ_DATA.questions.length > 0) {
        // 智能迁移：如果保存的题目数少于默认值，补足新增的题目
        if (QUIZ_DATA.questions.length < QUIZ_DEFAULT.questions.length) {
          const existingNums = new Set(QUIZ_DATA.questions.map(q => q.num));
          QUIZ_DEFAULT.questions.forEach(dq => {
            if (!existingNums.has(dq.num)) {
              QUIZ_DATA.questions.push(JSON.parse(JSON.stringify(dq)));
            }
          });
          // 同步更新 title/subtitle/grading（避免老版本残留）
          QUIZ_DATA.title = QUIZ_DEFAULT.title;
          QUIZ_DATA.subtitle = QUIZ_DEFAULT.subtitle;
          QUIZ_DATA.grading = JSON.parse(JSON.stringify(QUIZ_DEFAULT.grading));
          // 保存迁移后的数据
          try { localStorage.setItem(QUIZ_DATA_KEY, JSON.stringify(QUIZ_DATA)); } catch(e) {}
        }
        return;
      }
    }
  } catch(e) { console.error(e); }
  QUIZ_DATA = JSON.parse(JSON.stringify(QUIZ_DEFAULT));
}

function saveQuizData() {
  try {
    showStatus('saving', '保存中…');
    localStorage.setItem(QUIZ_DATA_KEY, JSON.stringify(QUIZ_DATA));
    setTimeout(() => showStatus('saved', sceneLabel() + ' · 已保存到本地'), 300);
  } catch(e) {
    showStatus('error', '保存失败');
  }
}

};

function loadQuizSession() {
  try {
    const raw = localStorage.getItem(QUIZ_STORAGE_KEY);

      const data = JSON.parse(raw);
      quizState = Object.assign(quizState, data);
    }

  while (quizState.chosen.length < QUIZ_DATA.questions.length) {

function saveQuizSession() {

    localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(quizState));

  loadQuizData();      // 先加载题目内容（含编辑过的）

  const QS = QUIZ_DATA.questions;
