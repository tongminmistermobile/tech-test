  // 候选人信息
  $('#qiName').value = quizState.candidate.name || '';
  $('#qiPhone').value = quizState.candidate.phone || '';
  $('#qiYears').value = quizState.candidate.years || '';
  $('#qiDate').value = quizState.candidate.date || (new Date()).toLocaleDateString('zh-CN');

  // 绑定候选人输入
  ['Name', 'Phone', 'Years', 'Date'].forEach(k => {
    const id = '#qi' + k;
    const key = k.toLowerCase();
    $(id).oninput = (e) => {
      quizState.candidate[key] = e.target.value;
      saveQuizSession();
      updateQuizSummary();
    };
  });

  // 渲染题目
  const body = $('#quizBody');
  body.innerHTML = '';
  QS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'qcard' + qi;

    // 头部
    const head = document.createElement('div');
    head.className = 'qhead';
    head.innerHTML = `
      <span class="qnum">第${q.num}题</span>
      <span class="qtag t-${q.diff}" contenteditable="${state.editMode ? 'true' : 'false'}" data-qi="${qi}" data-field="tag">${escapeHtml(q.tag)}</span>
      <span class="qscore">${q.open ? '开放题（面试官评定）' : '10分'}</span>
    `;
    card.appendChild(head);

    // 在编辑模式下绑定 tag 失焦保存
    if (state.editMode) {
      const tagEl = head.querySelector('.qtag');
      tagEl.addEventListener('blur', (e) => {
        const v = e.target.textContent.trim();
        if (v && v !== q.tag) {
          q.tag = v;
          saveQuizData();
        } else {
          e.target.textContent = q.tag;
        }
      });
    }

    // 场景
    const scene = document.createElement('div');
    scene.className = 'qscene';
    scene.textContent = q.scene;
    if (state.editMode) {
      scene.contentEditable = 'true';
      scene.addEventListener('blur', (e) => {
        const v = e.target.textContent.trim();
        if (v && v !== q.scene) {
          q.scene = v;
          saveQuizData();
        } else if (!v) {
          e.target.textContent = q.scene;
        }
      });
    }
    card.appendChild(scene);

    // 题干
    const ask = document.createElement('div');
    ask.className = 'qask';
    ask.textContent = q.ask;
    if (state.editMode) {
      ask.contentEditable = 'true';
      ask.addEventListener('blur', (e) => {
        const v = e.target.textContent.trim();
        if (v && v !== q.ask) {
          q.ask = v;
          saveQuizData();
        } else if (!v) {
          e.target.textContent = q.ask;
        }
      });
    }
    card.appendChild(ask);

    if (q.open) {
      // 开放题
      const wrap = document.createElement('div');
      wrap.className = 'open-wrap';
      const ta = document.createElement('textarea');
      ta.id = 'openText';
      ta.placeholder = '请输入您的诊断思路与操作方法...';
      ta.value = quizState.openText || '';
      ta.oninput = (e) => {
        quizState.openText = e.target.value;
        saveQuizSession();
      };
      wrap.appendChild(ta);
      const note = document.createElement('div');
      note.className = 'open-note';
      note.textContent = '此题由面试官评定，不计入自动评分';
      wrap.appendChild(note);
      card.appendChild(wrap);
    } else {
      // 选择题（支持单选 / 多选）
      const opts = document.createElement('div');
      opts.className = 'opts';

      // 判断某个选项当前是否选中
      const isSelected = (oi) => {
        if (q.multi) {
          return Array.isArray(quizState.chosen[qi]) && quizState.chosen[qi].includes(oi);
        }
        return quizState.chosen[qi] === oi;
      };

      q.opts.forEach((opt, oi) => {
        const o = document.createElement('div');
        o.className = 'opt';
        o.id = `opt${qi}_${oi}`;

        // 判断是否正确答案
        const isCorrectAns = q.multi
          ? (Array.isArray(q.ans) && q.ans.includes(oi))
          : (q.ans === oi);

        if (!state.editMode && isSelected(oi)) o.classList.add('sel');

        const innerHTML = state.editMode
          ? `<div class="opt-letter">${LETTERS[oi]}</div>
             <div class="opt-text" contenteditable="true" data-qi="${qi}" data-oi="${oi}">${escapeHtml(opt)}</div>
             <button class="opt-mark${isCorrectAns ? ' is-correct' : ''}" type="button" data-qi="${qi}" data-oi="${oi}" title="点击切换正确答案">
               ${isCorrectAns ? '✓ 正确答案' : '○ 设为正确'}
             </button>`
          : `<div class="opt-letter">${LETTERS[oi]}</div>
             <div class="opt-text">${escapeHtml(opt)}</div>`;
        o.innerHTML = innerHTML;

        if (state.editMode) {
          // 编辑模式下：高亮正确答案
          if (isCorrectAns) {
            o.classList.add('opt-correct-edit');
          }
          // 选项文字编辑
          const textEl = o.querySelector('.opt-text');
          textEl.addEventListener('blur', (e) => {
            const v = e.target.textContent.trim();
            if (v && v !== q.opts[oi]) {
              q.opts[oi] = v;
              saveQuizData();
            } else if (!v) {
              e.target.textContent = q.opts[oi];
            }
          });
          // 阻止点击选项本身触发答题
          o.addEventListener('click', (e) => e.stopPropagation());
          // 切换正确答案按钮
          const markBtn = o.querySelector('.opt-mark');
          markBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleCorrectAnswer(q, oi);
          });
        } else {
          // 答题模式下：原有点击逻辑
          o.onclick = () => {
            if (quizState.submitted) return;
            if (q.multi) {
              if (!Array.isArray(quizState.chosen[qi])) quizState.chosen[qi] = [];
              const arr = quizState.chosen[qi];
              const idx = arr.indexOf(oi);
              if (idx >= 0) arr.splice(idx, 1);
              else arr.push(oi);
              arr.sort((a, b) => a - b);
            } else {
              quizState.chosen[qi] = oi;
            }
            saveQuizSession();
            q.opts.forEach((_, k) => {
              $(`#opt${qi}_${k}`).classList.toggle('sel', isSelected(k));
            });
            card.classList.remove('unanswered');
            updateQuizSummary();
          };
        }
        opts.appendChild(o);
      });

      // 多选题标记
      if (q.multi) {
        const hint = document.createElement('div');
        hint.style.cssText = 'padding: 0 16px 12px; font-size: 12px; color: var(--q-muted); font-weight: 600;';
        hint.innerHTML = state.editMode
          ? '⚠️ 多选题：编辑模式下，点击"○ 设为正确"可切换正确答案（多选会累加，单选会替换）'
          : '⚠️ 多选题：请选出所有正确选项（全部答对得 10 分，否则 0 分）';
        card.appendChild(hint);
      } else if (state.editMode) {
        const hint = document.createElement('div');
        hint.style.cssText = 'padding: 0 16px 12px; font-size: 12px; color: var(--q-muted); font-weight: 600;';
        hint.innerHTML = '✎ 编辑模式：点击文字直接修改，点击"○ 设为正确"切换正确答案';
        card.appendChild(hint);
      }

      card.appendChild(opts);
    }

    body.appendChild(card);
  });

  // 提交 / 重置按钮
  $('#quizSubBtn').onclick = submitQuiz;
  $('#quizResetBtn').onclick = () => {
    if (!confirm('确定重新答题？将清空所有答案。')) return;
    resetQuizSession();
    renderQuiz();
    toast('已清空答案', 'success');
  };

  // 答卷记录按钮（编辑模式可见）
  $('#quizRecordsBtn').onclick = openRecordsList;
  $('#recordsCloseBtn').onclick = closeRecordsList;
  $('#recordDetailCloseBtn').onclick = () => {
    closeRecordDetail();
    closeRecordsList();
  };
  $('#recordDetailBackBtn').onclick = closeRecordDetail;
  $('#quizExportRecsBtn').onclick = () => {
    const arr = loadSubmissions();
    if (arr.length === 0) {
      toast('暂无答卷记录可导出', 'error');
      return;
    }
    exportSubmissionsJSON();
    toast(`已导出 ${arr.length} 份答卷记录`, 'success');
  };
  // 点击遮罩关闭
  $('#recordsOverlay').onclick = (e) => {
    if (e.target === $('#recordsOverlay')) closeRecordsList();
  };
  $('#recordDetailOverlay').onclick = (e) => {
    if (e.target === $('#recordDetailOverlay')) closeRecordDetail();
  };

  updateRecordsCount();

  // 如果已提交，恢复提交状态
  if (quizState.submitted) {
    applySubmittedVisuals();
  }

  updateQuizSummary();
}

function updateQuizSummary() {
  const QS = QUIZ_DATA.questions;
  const tbl = $('#quizSumTbl');

  // 构建表格（首次）
  if (!tbl.querySelector('thead')) {
    const thead = document.createElement('thead');
    thead.innerHTML = `
      <tr>
        <th style="width:48px">题号</th>
        <th>知识点</th>
        <th style="width:90px">所选</th>
        <th style="width:100px" class="correct-col">正确答案</th>
        <th style="width:80px">得分</th>
      </tr>
    `;
    tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    QS.forEach((q, qi) => {
      // 计算正确答案显示
      let correctText = '';
      if (q.open) {
        correctText = '—';
      } else if (q.multi) {
        correctText = (q.ans || []).slice().sort((a,b)=>a-b).map(i => LETTERS[i]).join(',');
      } else {
        correctText = LETTERS[q.ans];
      }
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${q.num}</strong></td>
        <td>${escapeHtml(q.tag)}</td>
        <td><span class="ans-cell" id="qSumAns${qi}">—</span></td>
        <td class="correct-col"><span class="correct-ans-cell" id="qSumCorrect${qi}">${correctText}</span></td>
        <td><span class="score-cell" id="qSumScore${qi}">—</span></td>
      `;
      tbody.appendChild(tr);
    });
    // 合计行
    const totalTr = document.createElement('tr');
    totalTr.className = 'totals-row';
    totalTr.innerHTML = `
      <td colspan="3"><strong>客观题合计（15 题 · 共 150 分）</strong></td>
      <td></td>
      <td><strong id="qTotalScore">—</strong></td>
    `;
    tbody.appendChild(totalTr);
    tbl.appendChild(tbody);
  }

  let total = 0;
  let allDone = true;
  QS.forEach((q, qi) => {
    const ansEl = $('#qSumAns' + qi);
    const scEl = $('#qSumScore' + qi);
    if (q.open) {
      ansEl.textContent = '开放题';
      ansEl.className = 'ans-cell';
      scEl.textContent = '待评';
      scEl.className = 'score-cell';
      return;
    }
    const sel = quizState.chosen[qi];

    // 判断是否已答
    let answered;
    if (q.multi) {
      answered = Array.isArray(sel) && sel.length > 0;
    } else {
      answered = sel !== null && sel !== undefined;
    }
    if (!answered) {
      allDone = false;
      ansEl.textContent = '—';
      ansEl.className = 'ans-cell';
      scEl.textContent = '—';
      scEl.className = 'score-cell';
      return;
    }

    // 显示所选
    if (q.multi) {
      ansEl.textContent = sel.map(i => LETTERS[i]).join(',');
    } else {
      ansEl.textContent = LETTERS[sel];
    }
    ansEl.className = 'ans-cell filled';

    if (quizState.submitted) {
      // 判分
      let ok;
      if (q.multi) {
        // 多选：严格比对（数量相同 + 完全一致）
        const correctSet = new Set(q.ans);
        const selSet = new Set(sel);
        ok = correctSet.size === selSet.size && [...correctSet].every(x => selSet.has(x));
      } else {
        ok = sel === q.ans;
      }
      scEl.textContent = ok ? '10' : '0';
      scEl.className = 'score-cell ' + (ok ? 'got' : 'miss');
      if (ok) total += 10;
    } else {
      scEl.textContent = '已选';
      scEl.className = 'score-cell';
    }
  });

  // 进度条 — 所有非 open 题都算
  const objQuestions = QS.filter(q => !q.open);
  let doneCount = 0;
  QS.forEach((q, qi) => {
    if (q.open) return;
    const sel = quizState.chosen[qi];
    if (q.multi) {
      if (Array.isArray(sel) && sel.length > 0) doneCount++;
    } else {
      if (sel !== null && sel !== undefined) doneCount++;
    }
  });
  $('#quizProg').style.width = quizState.submitted ? '100%' : (doneCount / objQuestions.length * 100) + '%';

  // 评分汇总
  const scoreEl = $('#qTotalScore');
  const bigEl = $('#quizScoreBig');
  const badge = $('#quizGradeBadge');
  const rec = $('#quizRecommend');

  if (quizState.submitted) {
    scoreEl.textContent = total + ' 分';
    bigEl.innerHTML = total + '<span> / 150分</span>';
    // 查找等级
    const tier = QUIZ_DATA.grading.find(g => total >= g.min);
    if (tier) {
      badge.textContent = tier.grade;
      badge.className = 'grade-badge-big ' + tier.className;
      rec.textContent = tier.recommend;
    }
  } else {
    scoreEl.textContent = '—';
    bigEl.innerHTML = '—<span> / 150分</span>';
    badge.textContent = doneCount === 0 ? '等待答题中…' : `已作答 ${doneCount}/${objQuestions.length} 题`;
    badge.className = 'grade-badge-big g-pending';
    rec.textContent = '';
  }
}

function toggleCorrectAnswer(q, oi) {
  if (q.multi) {
    // 多选：切换该选项是否在正确答案集合中
    if (!Array.isArray(q.ans)) q.ans = [];
    const idx = q.ans.indexOf(oi);
    if (idx >= 0) q.ans.splice(idx, 1);
    else q.ans.push(oi);
    q.ans.sort((a, b) => a - b);
    if (q.ans.length === 0) {
      toast('⚠️ 警告：该题已无正确答案，请至少设置一个', 'error');
    }
  } else {
    // 单选：直接替换
    q.ans = oi;
  }
  saveQuizData();
  renderQuiz();
  toast('已更新正确答案', 'success');
}

/* ============================================================
   答卷记录管理 — 渲染列表/详情
   ============================================================ */
function formatSubTime(iso) {
  try {
    const d = new Date(iso);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
  } catch(e) { return iso; }
}

function updateRecordsCount() {
  const cntEl = $('#quizRecCount');
  if (cntEl) {
    const n = loadSubmissions().length;
    cntEl.textContent = n;
  }
}

function openRecordsList() {
  renderRecordsList();
  $('#recordsOverlay').classList.add('show');
}
function closeRecordsList() {
  $('#recordsOverlay').classList.remove('show');
}
function openRecordDetail(id) {
  renderRecordDetail(id);
  $('#recordDetailOverlay').classList.add('show');
}
function closeRecordDetail() {
  $('#recordDetailOverlay').classList.remove('show');
}

function renderRecordsList() {
  const body = $('#recordsBody');
  const list = loadSubmissions();
  // 按时间倒序（最新的在最前）
  list.sort((a, b) => (b.submittedAt || '').localeCompare(a.submittedAt || ''));

  if (list.length === 0) {
    body.innerHTML = `
      <div class="rec-empty">
        📭 暂无答卷记录<br>
        <span style="font-size:12px;margin-top:8px;display:inline-block;color:var(--q-muted);">候选人提交答卷后，记录会自动出现在这里</span>
      </div>
    `;
    return;
  }

  let html = `
    <table class="rec-table">
      <thead>
        <tr>
          <th>姓名</th>
          <th class="hide-mobile">电话</th>
          <th class="hide-mobile">从业年限</th>
          <th>提交时间</th>
          <th>得分</th>
          <th>等级</th>
          <th style="text-align:right;">操作</th>
        </tr>
      </thead>
      <tbody>
  `;
  list.forEach(sub => {
    const candidate = sub.candidate || {};
    html += `
      <tr>
        <td><span class="rec-name">${escapeHtml(candidate.name || '未填写')}</span></td>
        <td class="hide-mobile">${escapeHtml(candidate.phone || '—')}</td>
        <td class="hide-mobile">${escapeHtml(candidate.years || '—')}</td>
        <td>${formatSubTime(sub.submittedAt)}</td>
        <td><span class="rec-score">${sub.total}/150</span></td>
        <td><span class="rec-grade-badge ${sub.className || 'g-pending'}">${escapeHtml(sub.grade || '—')}</span></td>
        <td class="rec-actions">
          <button class="btn-view" data-id="${sub.id}">查看</button>
          <button class="btn-del" data-id="${sub.id}">删除</button>
        </td>
      </tr>
    `;
  });
  html += '</tbody></table>';
  body.innerHTML = html;

  // 绑定事件
  body.querySelectorAll('.btn-view').forEach(btn => {
    btn.onclick = () => openRecordDetail(btn.dataset.id);
  });
  body.querySelectorAll('.btn-del').forEach(btn => {
    btn.onclick = () => {
      const sub = loadSubmissions().find(s => s.id === btn.dataset.id);
      if (!sub) return;
      const name = (sub.candidate && sub.candidate.name) || '该候选人';
      if (!confirm(`确定删除「${name}」的答卷记录？\n此操作不可恢复。`)) return;
      deleteSubmission(btn.dataset.id);
      renderRecordsList();
      updateRecordsCount();
      toast('已删除答卷记录', 'success');
    };
  });
}

function renderRecordDetail(id) {
  const sub = loadSubmissions().find(s => s.id === id);
  if (!sub) {
    $('#recordDetailBody').innerHTML = '<div class="rec-empty">记录不存在或已被删除</div>';
    return;
  }
  const candidate = sub.candidate || {};
  $('#recordDetailTitle').textContent = `答卷详情 · ${candidate.name || '未填写姓名'}`;

  const body = $('#recordDetailBody');
  let html = `
    <div class="rec-detail-body">
      <!-- 候选人信息 -->
      <div class="rec-detail-card">
        <div class="rec-detail-grid">
          <div class="rec-detail-item">
            <div class="lbl">姓名</div>
            <div class="val">${escapeHtml(candidate.name || '—')}</div>
          </div>
          <div class="rec-detail-item">
            <div class="lbl">联系电话</div>
            <div class="val">${escapeHtml(candidate.phone || '—')}</div>
          </div>
          <div class="rec-detail-item">
            <div class="lbl">从业年限</div>
            <div class="val">${escapeHtml(candidate.years || '—')}</div>
          </div>
          <div class="rec-detail-item">
            <div class="lbl">答题日期</div>
            <div class="val">${escapeHtml(candidate.date || '—')}</div>
          </div>
          <div class="rec-detail-item">
            <div class="lbl">提交时间</div>
            <div class="val">${formatSubTime(sub.submittedAt)}</div>
          </div>
        </div>
      </div>

      <!-- 评分总览 -->
      <div class="rec-detail-grade">
        <div class="big-score">${sub.total}<span> / 150 分</span></div>
        <div class="rec-grade-badge ${sub.className || 'g-pending'}">${escapeHtml(sub.grade || '—')}</div>
        <div class="recommend-text">${escapeHtml(sub.recommend || '')}</div>
      </div>

      <!-- 答题详情 -->
      <div class="quiz-sec-title" style="margin-bottom:12px;">答题详情</div>
  `;

  const questions = sub.questionsSnapshot || [];
  questions.forEach((q, qi) => {
    if (q.open) return;
    const sel = sub.chosen[qi];
    let ok, userText, correctText;
    if (q.multi) {
      const correctSet = new Set(q.ans || []);
      const selSet = new Set(Array.isArray(sel) ? sel : []);
      ok = correctSet.size === selSet.size && [...correctSet].every(x => selSet.has(x));
      userText = (Array.isArray(sel) ? sel : []).slice().sort((a,b)=>a-b).map(i => LETTERS[i]).join(',') || '—';
      correctText = (q.ans || []).slice().sort((a,b)=>a-b).map(i => LETTERS[i]).join(',');
    } else {
      ok = sel === q.ans;
      userText = (sel === null || sel === undefined) ? '—' : LETTERS[sel];

    }

    html += `
      <div class="rec-detail-qcard ${ok ? 'right' : 'wrong'}">

          <span class="q-num">第${q.num}题</span>
          <span class="q-tag">${escapeHtml(q.tag)}</span>
          ${q.multi ? '<span style="font-size:11px;color:var(--q-amber);font-weight:600;">[多选]</span>' : ''}
          <span class="q-score ${ok ? 'got' : 'miss'}">${ok ? '✓ 10 分' : '✗ 0 分'}</span>
        </div>
        <div class="q-ask">${escapeHtml(q.ask)}</div>
        <div class="q-ans-line">
          <div><span class="label">候选人答案：</span><span class="val-user ${ok ? 'right' : 'wrong'}">${userText}</span></div>
          <div><span class="label">正确答案：</span><span class="val-correct">${correctText}</span></div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  body.innerHTML = html;
}

function submitQuiz() {
  if (quizState.submitted) return;
  const QS = QUIZ_DATA.questions;

  // 检查是否所有非 open 题都答了（包括多选）
  const missing = [];
  QS.forEach((q, qi) => {
    if (q.open) return;
    const sel = quizState.chosen[qi];
    const answered = q.multi
      ? (Array.isArray(sel) && sel.length > 0)
      : (sel !== null && sel !== undefined);
    if (!answered) missing.push(qi);
  });
  if (missing.length) {
    missing.forEach(i => {
      const card = $('#qcard' + i);
      if (card) card.classList.add('unanswered');
    });
    $('#quizWarnMsg').classList.add('show');
    const firstCard = $('#qcard' + missing[0]);
    if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  quizState.submitted = true;
  saveQuizSession();

  // 计算分数和等级，保存为完整答卷记录
  let total = 0;
  QS.forEach((q, qi) => {
    if (q.open) return;
    const sel = quizState.chosen[qi];
    let ok;
    if (q.multi) {
      const correctSet = new Set(q.ans);
      const selSet = new Set(Array.isArray(sel) ? sel : []);
      ok = correctSet.size === selSet.size && [...correctSet].every(x => selSet.has(x));
    } else {
      ok = sel === q.ans;
    }
    if (ok) total += 10;
  });
  const tier = QUIZ_DATA.grading.find(g => total >= g.min);

  // 构造答卷记录
  const submission = {
    id: 'sub_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    submittedAt: new Date().toISOString(),
    candidate: Object.assign({}, quizState.candidate),
    chosen: JSON.parse(JSON.stringify(quizState.chosen)),
    total: total,
    grade: tier ? tier.grade : '',
    className: tier ? tier.className : '',
    recommend: tier ? tier.recommend : '',
    // 快照保存当时的试卷题目内容（防止题目以后被编辑导致回看错乱）
    questionsSnapshot: JSON.parse(JSON.stringify(QUIZ_DATA.questions)),
    quizTitle: QUIZ_DATA.title,
    quizSubtitle: QUIZ_DATA.subtitle
  };
  appendSubmission(submission);
  updateRecordsCount();

  $('#quizWarnMsg').classList.remove('show');
  $('#quizSubBtn').disabled = true;
  $('#quizSubBtn').textContent = '已提交';
  applySubmittedVisuals();
  updateQuizSummary();
  document.querySelector('.summary').scrollIntoView({ behavior: 'smooth', block: 'start' });
  toast('答卷已提交，已保存到答卷记录', 'success');
}

function applySubmittedVisuals() {
  const QS = QUIZ_DATA.questions;
  QS.forEach((q, qi) => {
    if (q.open) return;
    const sel = quizState.chosen[qi];
    // 把单选答案和多选答案都统一成 Set
    const correctSet = q.multi
      ? new Set(q.ans)
      : new Set([q.ans]);
    const userSet = q.multi
      ? new Set(Array.isArray(sel) ? sel : [])
      : new Set([sel].filter(x => x !== null && x !== undefined));

    q.opts.forEach((_, oi) => {
      const el = $(`#opt${qi}_${oi}`);
      if (!el) return;
      el.style.cursor = 'default';
      const isCorrect = correctSet.has(oi);
      const isPicked = userSet.has(oi);
      if (isCorrect) {
        // 正确答案 → 始终绿色
        el.style.borderColor = 'var(--q-green)';
        el.style.background = 'var(--q-green-lt)';
      } else if (isPicked) {
        // 用户选了但是错的 → 红色
        el.style.borderColor = 'var(--q-red)';
        el.style.background = 'var(--q-red-lt)';
      }
    });
  });
  $('#quizSubBtn').disabled = true;
  $('#quizSubBtn').textContent = '已提交';
}
