<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>维修话术查询系统 · 线下技术员定购与诊断</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --bg: #f7f6f3;
    --bg-elevated: #ffffff;
    --bg-sidebar: #1c1f2a;
    --bg-sidebar-hover: #272b3a;
    --text: #1c1f2a;
    --text-muted: #6b7180;
    --text-on-dark: #e8e7e3;
    --text-on-dark-muted: #8b91a3;
    --border: #e5e3dc;
    --border-strong: #d4d1c5;
    --accent: #c2410c;
    --accent-deep: #9a3412;
    --accent-soft: #fef3e9;
    --role-cs: #0369a1;
    --role-cs-bg: #eff8ff;
    --role-fd: #15803d;
    --role-fd-bg: #f0fdf4;
    --role-tech: #7c2d12;
    --role-tech-bg: #fef3e9;
    --role-parts: #6b21a8;
    --role-parts-bg: #faf5ff;
    --tag-warn: #b91c1c;
    --tag-warn-bg: #fef2f2;
    --tag-info: #0369a1;
    --tag-info-bg: #eff8ff;
    --tag-success: #15803d;
    --tag-success-bg: #f0fdf4;
    --edit: #d97706;
    --edit-bg: #fef3c7;
    --danger: #dc2626;
    --font-display: 'Noto Serif SC', Georgia, serif;
    --font-body: 'Noto Sans SC', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --shadow-sm: 0 1px 2px rgba(28, 31, 42, 0.05);
    --shadow-md: 0 4px 12px rgba(28, 31, 42, 0.08);
    --shadow-lg: 0 12px 32px rgba(28, 31, 42, 0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ========== 顶部工具条 ========== */
  .topbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    height: 44px;
    flex-shrink: 0;
  }
  .topbar-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    color: var(--text-on-dark);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all .15s ease;
    font-weight: 500;
  }
  .topbar-btn:hover {
    background: rgba(255,255,255,0.12);
  }
  .topbar-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
  }
  .topbar-btn.primary:hover {
    background: var(--accent-deep);
  }
  .topbar-btn.edit-on {
    background: var(--edit);
    border-color: var(--edit);
    color: #fff;
  }
  /* ========== 场景切换器 ========== */
  .scene-switcher {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
    margin-right: 12px;
  }
  .scene-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--text-on-dark-muted);
    border: none;
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 12.5px;
    font-family: var(--font-body);
    font-weight: 600;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .scene-btn:hover {
    color: var(--text-on-dark);
  }
  .scene-btn.active {
    color: #fff;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .scene-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }
  .scene-dot.offline { background: #c2410c; }   /* 线下 — terracotta */
  .scene-dot.online { background: #0369a1; }    /* 线上 — 海蓝 */

  /* 场景为 online 时，accent 色变蓝 */
  body[data-scene="online"] {
    --accent: #0369a1;
    --accent-deep: #075985;
    --accent-soft: #e0f2fe;
  }
  .topbar-status {
    margin-right: auto;
    color: var(--text-on-dark-muted);
    font-size: 11.5px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .topbar-status .save-indicator {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16a34a;
    margin-right: 6px;
    vertical-align: middle;
  }
  .topbar-status.saving .save-indicator { background: var(--edit); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ========== 应用布局 ========== */
  .app {
    display: grid;
    grid-template-columns: 280px 360px 1fr;
    height: calc(100vh - 44px);
  }

  /* ========== 侧边栏 ========== */
  .sidebar {
    background: var(--bg-sidebar);
    color: var(--text-on-dark);
    overflow-y: auto;
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 24px 24px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    background: var(--bg-sidebar);
    z-index: 2;
  }
  .sidebar-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .sidebar-subtitle {
    font-size: 11.5px;
    color: var(--text-on-dark-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    margin-top: 4px;
  }
  .sidebar-divider {
    height: 2px;
    background: var(--accent);
    width: 32px;
    margin-top: 12px;
  }
  .sidebar-search {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .search-box { position: relative; }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 9px 12px 9px 34px;
    color: var(--text-on-dark);
    font-family: var(--font-body);
    font-size: 13px;
  }
  .search-input::placeholder { color: var(--text-on-dark-muted); }
  .search-input:focus { outline: none; background: rgba(255,255,255,0.10); border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-on-dark-muted);
  }

  .category-list {
    padding: 10px 12px 12px;
    overflow-y: auto;
    flex: 1;
  }
  .category-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-on-dark-muted);
    font-size: 13.5px;
    font-weight: 500;
    transition: all .12s ease;
    margin-bottom: 2px;
    border-left: 3px solid transparent;
    position: relative;
  }
  .category-item:hover {
    background: var(--bg-sidebar-hover);
    color: var(--text-on-dark);
  }
  .category-item.active {
    background: rgba(194, 65, 12, 0.12);
    color: #fff;
    border-left-color: var(--accent);
  }
  .category-icon {
    width: 26px; height: 26px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    background: rgba(255,255,255,0.06);
    font-size: 14px;
    flex-shrink: 0;
  }
  .category-item.active .category-icon { background: var(--accent); }
  .category-name { flex: 1; }
  .category-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-on-dark-muted);
    background: rgba(255,255,255,0.04);
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }
  .category-item.active .category-count {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .category-edit, .category-delete {
    display: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1;
  }
  .category-edit { color: var(--edit); }
  .category-edit:hover { background: rgba(217, 119, 6, 0.2); }
  .category-delete { color: var(--danger); }
  .category-delete:hover { background: rgba(220, 38, 38, 0.2); }
  body.edit-mode .category-edit,
  body.edit-mode .category-delete { display: inline-block; }
  body.edit-mode .category-count { display: none; }

  .sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: var(--text-on-dark-muted);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .stats-row { display: flex; justify-content: space-between; align-items: center; }

  .add-category-btn {
    display: none;
    width: calc(100% - 24px);
    margin: 8px 12px;
    padding: 10px;
    background: rgba(217, 119, 6, 0.15);
    color: var(--edit);
    border: 1px dashed var(--edit);
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .add-category-btn:hover { background: rgba(217, 119, 6, 0.25); }
  body.edit-mode .add-category-btn { display: block; }

  /* ========== 故障列表区 ========== */
  .fault-list-pane {
    background: var(--bg);
    overflow-y: auto;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .fault-list-header {
    padding: 24px 26px 14px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 2;
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .fault-list-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.02em;
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .fault-list-title .accent-line {
    width: 26px;
    height: 4px;
    background: var(--accent);
    display: inline-block;
    flex-shrink: 0;
  }
  .fault-list {
    padding: 14px 18px 24px;
    overflow-y: auto;
    flex: 1;
  }
  .fault-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 9px;
    cursor: pointer;
    transition: all .15s ease;
    position: relative;
  }
  .fault-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .fault-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .fault-card.active::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 12px;
    bottom: 12px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .fault-cat-label {
    font-size: 10.5px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
  }
  .fault-symptom {
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 7px;
  }
  .fault-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .fault-delete {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--danger);
    color: #fff;
    border: none;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
  }
  body.edit-mode .fault-delete { display: block; }

  .tag {
    display: inline-flex;
    align-items: center;
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag-warn { background: var(--tag-warn-bg); color: var(--tag-warn); }
  .tag-info { background: var(--tag-info-bg); color: var(--tag-info); }
  .tag-success { background: var(--tag-success-bg); color: var(--tag-success); }
  .tag-default { background: #f3f1ec; color: #57534e; }

  .add-fault-btn {
    display: none;
    width: 100%;
    padding: 14px;
    background: rgba(217, 119, 6, 0.08);
    color: var(--edit);
    border: 2px dashed var(--edit);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    margin-bottom: 9px;
  }
  .add-fault-btn:hover { background: rgba(217, 119, 6, 0.15); }
  body.edit-mode .add-fault-btn { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  /* ========== 详情区 ========== */
  .detail-pane {
    background: var(--bg-elevated);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .detail-header {
    padding: 32px 44px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .detail-overline {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .detail-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.015em;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .detail-tags .tag {
    font-size: 11.5px;
    padding: 3px 10px;
  }
  .tag-edit-btn {
    display: none;
    padding: 3px 8px;
    background: var(--edit-bg);
    color: var(--edit);
    border: 1px dashed var(--edit);
    border-radius: 4px;
    font-size: 10.5px;
    cursor: pointer;
    font-family: var(--font-body);
  }
  body.edit-mode .tag-edit-btn { display: inline-block; }
  body.edit-mode .tag {
    padding-right: 4px;
  }
  body.edit-mode .tag .tag-x {
    display: inline-block;
    margin-left: 4px;
    cursor: pointer;
    color: var(--danger);
    font-weight: 700;
  }
  .tag .tag-x { display: none; }

  .role-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 44px;
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .role-tab {
    padding: 13px 0;
    margin-right: 32px;
    cursor: pointer;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .role-tab:hover { color: var(--text); }
  .role-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .role-tab .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .role-tab[data-role="cs"] .dot { background: var(--role-cs); }
  .role-tab[data-role="fd"] .dot { background: var(--role-fd); }
  .role-tab[data-role="tech"] .dot { background: var(--role-tech); }
  .role-tab[data-role="parts"] .dot { background: var(--role-parts); }

  .detail-content {
    padding: 28px 44px 60px;
    flex: 1;
    overflow-y: auto;
  }
  .role-section h3 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    margin-top: 26px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .role-section h3:first-child { margin-top: 0; }
  .role-section h3 .indicator {
    width: 6px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  .speech-card {
    background: var(--role-cs-bg);
    border-left: 3px solid var(--role-cs);
    padding: 18px 22px;
    border-radius: 8px;
    margin-bottom: 14px;
    position: relative;
  }
  .speech-card::before {
    content: '\201C';
    position: absolute;
    top: -12px;
    left: 16px;
    font-family: var(--font-display);
    font-size: 52px;
    color: var(--role-cs);
    line-height: 1;
    opacity: 0.3;
  }
  .speech-text {
    font-size: 14.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    position: relative;
    z-index: 1;
  }

  .step-list, .question-list, .parts-list {
    list-style: none;
  }
  .step-list { counter-reset: step; }
  .step-list li {
    counter-increment: step;
    padding: 11px 16px 11px 46px;
    background: #fafaf7;
    border-radius: 8px;
    margin-bottom: 7px;
    position: relative;
    font-size: 13.5px;
    line-height: 1.6;
    border: 1px solid var(--border);
  }
  .step-list li::before {
    content: counter(step);
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    background: var(--role-fd);
    color: #fff;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-mono);
  }
  .role-section[data-role="tech"] .step-list li::before { background: var(--role-tech); }

  .question-list li {
    padding: 9px 14px 9px 32px;
    background: #fafaf7;
    border-radius: 7px;
    margin-bottom: 6px;
    position: relative;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .question-list li::before {
    content: '?';
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    background: var(--role-cs);
    color: #fff;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 700;
  }

  .parts-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .part-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--role-parts-bg);
    border: 1px solid #e9d5ff;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    position: relative;
  }
  .part-item::before {
    content: '\25C6';
    color: var(--role-parts);
    font-size: 12px;
  }

  .note-box {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-left: 3px solid #d97706;
    padding: 13px 18px;
    border-radius: 7px;
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.7;
    color: #78350f;
  }
  .note-box strong { font-weight: 700; }

  /* ========== 编辑模式：可编辑元素 ========== */
  body.edit-mode .editable {
    cursor: text;
    outline: 1px dashed transparent;
    transition: all .12s ease;
    border-radius: 4px;
    padding: 2px 6px;
    margin: -2px -6px;
    position: relative;
  }
  body.edit-mode .editable:hover {
    outline-color: var(--edit);
    background: var(--edit-bg);
  }
  body.edit-mode .editable:focus {
    outline: 2px solid var(--edit);
    background: #fffbeb;
  }
  body.edit-mode .speech-card .editable,
  body.edit-mode .note-box .editable {
    background: rgba(255,255,255,0.5);
  }
  body.edit-mode .speech-card .editable:focus,
  body.edit-mode .note-box .editable:focus {
    background: #fff;
  }

  /* 列表项 添加/删除按钮 */
  .list-item-controls {
    display: none;
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    gap: 4px;
  }
  body.edit-mode .step-list li,
  body.edit-mode .question-list li,
  body.edit-mode .part-item {
    padding-right: 70px;
  }
  body.edit-mode .list-item-controls { display: flex; }
  .li-btn {

let REPAIR_DATA = null;  // 指向当前场景的数据

/* ============================================================
   状态
   ============================================================ */
let state = {
  scene: 'offline',         // 'offline' = 线下话术；'online' = 线上客服
  categoryId: null,
  faultId: null,
  role: 'cs',
  search: '',
  editMode: false
};

function storageKey() {
  return 'repair_db_v3_' + state.scene;
}

function sceneLabel() {
  return state.scene === 'offline' ? '线下话术' : '线上客服';
}

/* ============================================================
   工具
   ============================================================ */
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}
function tagClass(name) {
  const warn = ['保资料','需签名','主板级','资料丢失','iPhone 16+','需要凭据'];
  const info = ['前台先测','软件','运营商','主板可能','保资料 (15+)'];
  const success = ['电池','按键','排线/按键','NFC','外玻璃','感光排线','麦克风','扬声器','听筒','震动器','摄像头','闪光灯','镜片','面容','陀螺仪','后玻璃','中框','底部麦克风','屏幕','SIM','iPhone 16+','水损/摔机','无线充电','谷歌锁','三星账户','Apple ID','组装屏','主板','天线','GPS 模块 IC'];
  if (warn.includes(name)) return 'tag-warn';
  if (info.includes(name)) return 'tag-info';
  if (success.includes(name)) return 'tag-success';
  return 'tag-default';
}
function uid(prefix='id') {
  return prefix + '_' + Math.random().toString(36).substring(2, 9);
}
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   持久化
   ============================================================ */
function saveData() {
  try {
    showStatus('saving', '保存中…');
    localStorage.setItem(storageKey(), JSON.stringify(REPAIR_DATA));
    setTimeout(() => showStatus('saved', sceneLabel() + ' · 已保存到本地'), 300);
  } catch(e) {
    showStatus('error', '保存失败');
    console.error(e);
  }
}
function loadData() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) {
      REPAIR_DATA = JSON.parse(raw);
      return true;
    }
  } catch(e) { console.error(e); }
  // 没有保存的数据，从 DEFAULT_DATA 加载当前场景
  REPAIR_DATA = deepClone(DEFAULT_DATA[state.scene] || DEFAULT_DATA);
  return false;
}
function showStatus(state, text) {
  const status = $('.topbar-status');
  status.classList.remove('saving', 'error');
  if (state === 'saving') status.classList.add('saving');
  if (state === 'error') status.classList.add('error');
  $('#statusText').textContent = text;
}

/* ============================================================
   场景切换
   ============================================================ */
function switchScene(newScene) {
  if (newScene === state.scene) return;
  state.scene = newScene;
  state.categoryId = null;
  state.faultId = null;
  state.role = 'cs';
  state.search = '';
  state.editMode = false;
  document.body.classList.remove('edit-mode');
  document.body.setAttribute('data-scene', newScene);

  // 更新顶部场景按钮状态
  $$('.scene-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.scene === newScene);
  });

  // 更新编辑按钮文字
  const editBtn = $('#editBtn');
  editBtn.textContent = '✎ 进入编辑模式';
  editBtn.classList.remove('edit-on');
  editBtn.classList.add('primary');

  // 清空搜索
  if ($('#searchInput')) $('#searchInput').value = '';

  // 重新加载该场景的数据
  loadData();

  renderCategories();
  renderFaultList();
  renderDetail();
  showStatus('saved', sceneLabel() + ' · 已就绪');
  toast(`已切换到「${sceneLabel()}」`, 'success');
}

/* ============================================================
   Toast
   ============================================================ */
function toast(msg, type='') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ============================================================
   模态对话框
   ============================================================ */
function modal({ title, html, onSave, saveLabel = '保存', size = 'normal' }) {
  const m = $('#modal');
  const c = $('#modalContent');
  c.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' + html +
    '<div class="modal-actions">' +
    '<button class="modal-btn secondary" id="modalCancel">取消</button>' +
    '<button class="modal-btn primary" id="modalOk">' + escapeHtml(saveLabel) + '</button>' +
    '</div>';
  m.classList.add('show');
  $('#modalCancel').onclick = () => m.classList.remove('show');
  $('#modalOk').onclick = () => {
    try {
      const result = onSave();
      if (result !== false) m.classList.remove('show');
    } catch(e) { toast(e.message || '保存失败', 'error'); }
  };
  m.onclick = (e) => { if (e.target === m) m.classList.remove('show'); };
}

/* ============================================================
   统计
   ============================================================ */
function getTotalFaults() {
  return REPAIR_DATA.categories.reduce((sum, c) => sum + c.faults.length, 0);
}

/* ============================================================
   渲染分类列表
   ============================================================ */
function renderCategories() {
  const list = $('#categoryList');
  list.innerHTML = '';
  REPAIR_DATA.categories.forEach(cat => {
    const item = el('div', {
      class: 'category-item' + (state.categoryId === cat.id ? ' active' : ''),
      'data-id': cat.id,
      onclick: (e) => {
        if (e.target.closest('.category-edit, .category-delete')) return;
        selectCategory(cat.id);
      }
    }, [
      el('div', {
        class: 'category-icon',
        title: state.editMode ? '点击修改图标' : '',
        onclick: (ev) => {
          if (!state.editMode) return;
          ev.stopPropagation();
          editCategoryIcon(cat.id);
        }
      }, [cat.icon || '🔧']),
      el('span', { class: 'category-name' }, [cat.name]),
      el('span', { class: 'category-count' }, [String(cat.faults.length)]),
      el('span', {
        class: 'category-edit',
        title: '重命名',
        onclick: (ev) => {
          ev.stopPropagation();
          renameCategory(cat.id);
        }
      }, ['✎']),
      el('span', {
        class: 'category-delete',
        title: '删除此分类',
        onclick: (ev) => {
          ev.stopPropagation();
          confirmDeleteCategory(cat.id);
        }
      }, ['×'])
    ]);
    list.appendChild(item);
  });
  $('#catCount').textContent = REPAIR_DATA.categories.length;
  $('#totalFaultsLabel').textContent = getTotalFaults() + ' 条';
}

/* ============================================================
   渲染故障列表
   ============================================================ */
function renderFaultList() {
  const list = $('#faultList');
  list.innerHTML = '';

  // 全局搜索
  if (state.search) {
    const matches = [];
    REPAIR_DATA.categories.forEach(cat => {
      cat.faults.forEach(f => {
        if (matchesSearch(f, state.search)) matches.push({ cat, fault: f });
      });
    });
    $('#breadcrumb').textContent = 'SEARCH RESULTS';
    $('#categoryTitle').textContent = `搜索 "${state.search}" · ${matches.length} 项`;
    if (matches.length === 0) {
      list.appendChild(el('div', { class: 'empty-state' }, [
        el('div', { class: 'empty-icon' }, ['🔍']),
        el('div', {}, ['无匹配结果'])
      ]));
      return;
    }
    matches.forEach(({ cat, fault }) => {
      list.appendChild(buildFaultCard(cat, fault, true));
    });
    return;
  }

  const cat = REPAIR_DATA.categories.find(c => c.id === state.categoryId);
  if (!cat) {
    $('#breadcrumb').textContent = 'FAULT CATEGORY';
    $('#categoryTitle').textContent = '选择故障类别';
    list.appendChild(el('div', { class: 'empty-state' }, [
      el('div', { class: 'empty-icon' }, ['👈']),
      el('div', {}, ['请从左侧选择一个故障类别'])
    ]));
    return;
  }
  $('#breadcrumb').textContent = (cat.id || '').toUpperCase().replace(/_/g, ' · ');
  $('#categoryTitle').textContent = cat.name;

  cat.faults.forEach(fault => list.appendChild(buildFaultCard(cat, fault, false)));

  // 新增故障按钮（编辑模式）
  const addBtn = el('button', {
    class: 'add-fault-btn',
    onclick: () => addFault(cat.id)
  }, ['+ 新增故障案例']);
  list.appendChild(addBtn);
}

function buildFaultCard(cat, fault, showCat) {
  const card = el('div', {
    class: 'fault-card' + (state.faultId === fault.id ? ' active' : ''),
    onclick: (e) => {
      if (e.target.classList.contains('fault-delete')) return;
      state.categoryId = cat.id;
      state.faultId = fault.id;
      state.role = 'cs';
      renderCategories();
      renderFaultList();
      renderDetail();
    }
  }, []);

  if (showCat) {
    card.appendChild(el('span', { class: 'fault-cat-label' }, [(cat.icon || '🔧') + ' ' + cat.name]));
  }

  card.appendChild(el('div', { class: 'fault-symptom' }, [fault.symptom]));
  card.appendChild(renderTagList(fault.tags || [], 'fault-tags', false));

  // 删除按钮
  card.appendChild(el('button', {
    class: 'fault-delete',
    title: '删除此故障',
    onclick: (ev) => {
      ev.stopPropagation();
      if (confirm(`确定删除故障"${fault.symptom}"？此操作不可撤销。`)) {
        cat.faults = cat.faults.filter(f => f.id !== fault.id);
        if (state.faultId === fault.id) state.faultId = null;
        saveData();
        renderCategories();
        renderFaultList();
        renderDetail();
        toast('已删除', 'success');
      }
    }
  }, ['×']));

  return card;
}

function renderTagList(tags, className, editable) {
  const wrap = el('div', { class: className });
  tags.forEach((t, i) => {
    const tagEl = el('span', { class: 'tag ' + tagClass(t) }, [t]);
    if (editable) {
      tagEl.appendChild(el('span', { class: 'tag-x', onclick: (ev) => {
        ev.stopPropagation();
        removeTag(i);
      } }, ['×']));
    }
    wrap.appendChild(tagEl);
  });
  return wrap;
}

function matchesSearch(fault, q) {
  q = q.toLowerCase();
  const blobs = [
    fault.symptom,
    fault.customerService || '',
    fault.note || '',
    ...(fault.customerAsk || []),
    ...(fault.frontDeskDiag || []),
    ...(fault.techProcess || []),
    ...(fault.parts || []),
    ...(fault.tags || [])
  ];
  return blobs.some(b => String(b).toLowerCase().includes(q));
}

/* ============================================================
   渲染详情
   ============================================================ */
function renderDetail() {
  const pane = $('#detailPane');
  pane.innerHTML = '';

  if (!state.faultId) {
    pane.appendChild(buildWelcome());
    return;
  }

  const cat = REPAIR_DATA.categories.find(c => c.id === state.categoryId);
  if (!cat) return;
  const fault = cat.faults.find(f => f.id === state.faultId);
  if (!fault) {
    state.faultId = null;
    renderDetail();
    return;
  }

  // Header
  const header = el('div', { class: 'detail-header' });
  header.appendChild(el('div', { class: 'detail-overline' },
    [cat.name + ' · ' + (fault.id || '').toUpperCase().replace(/_/g, ' ')]));

  header.appendChild(el('h1', {
    class: 'detail-title editable',
    contenteditable: state.editMode ? 'true' : 'false',
    onblur: (e) => { fault.symptom = e.target.textContent.trim() || fault.symptom; saveData(); renderFaultList(); }
  }, [fault.symptom]));

  // 标签编辑
  const tagsRow = el('div', { class: 'detail-tags' });
  (fault.tags || []).forEach((t, i) => {
    const tagEl = el('span', { class: 'tag ' + tagClass(t) }, [t]);
    if (state.editMode) {
      tagEl.appendChild(el('span', { class: 'tag-x', onclick: () => {
        fault.tags.splice(i, 1);
        saveData();
        renderDetail();
        renderFaultList();
      } }, ['×']));
    }
    tagsRow.appendChild(tagEl);
  });
  if (state.editMode) {
    tagsRow.appendChild(el('button', {
      class: 'tag-edit-btn',
      onclick: () => addTag(fault)
    }, ['+ 标签']));
  }
  header.appendChild(tagsRow);
  pane.appendChild(header);

  // Tabs
  const tabsWrap = el('div', { class: 'role-tabs' });
  const roles = state.scene === 'online' ? [
    { id: 'cs', name: '客服话术' },
    { id: 'fd', name: '远程引导' },
    { id: 'tech', name: '内部参考' },
    { id: 'parts', name: '可能订货' }
  ] : [
    { id: 'cs', name: '客服话术' },
    { id: 'fd', name: '前台诊断' },
    { id: 'tech', name: '技术员处理' },
    { id: 'parts', name: '订货清单' }
  ];
  roles.forEach(r => {
    tabsWrap.appendChild(el('div', {
      class: 'role-tab' + (state.role === r.id ? ' active' : ''),
      'data-role': r.id,
      onclick: () => { state.role = r.id; renderDetail(); }
    }, [
      el('span', { class: 'dot' }),
      el('span', {}, [r.name])
    ]));
  });
  pane.appendChild(tabsWrap);

  // Content
  const content = el('div', { class: 'detail-content' });
  content.appendChild(renderRoleSection(state.role, fault));

  // 注意事项
  const noteWrap = el('div', {});
  if (fault.note || state.editMode) {
    const noteBox = el('div', { class: 'note-box' });
    noteBox.appendChild(el('strong', {}, ['⚠️ 注意事项：']));
    noteBox.appendChild(el('span', {
      class: 'editable',
      contenteditable: state.editMode ? 'true' : 'false',
      'data-placeholder': '点击添加注意事项…',
      onblur: (e) => { fault.note = e.target.textContent.trim(); saveData(); }
    }, [' ' + (fault.note || (state.editMode ? '(点此添加注意事项)' : ''))]));
    noteWrap.appendChild(noteBox);
  }
  content.appendChild(noteWrap);

  // 删除整个故障按钮（编辑模式）
  if (state.editMode) {
    const del = el('div', { class: 'delete-fault-section' });
    del.appendChild(el('button', {
      class: 'danger-btn',
      onclick: () => {
        if (confirm(`确定删除整个故障"${fault.symptom}"？`)) {
          cat.faults = cat.faults.filter(f => f.id !== fault.id);
          state.faultId = null;
          saveData();
          renderCategories();
          renderFaultList();
          renderDetail();
          toast('已删除故障', 'success');
        }
      }
    }, ['🗑 删除整个故障']));
    content.appendChild(del);
  }

  pane.appendChild(content);
}

function buildWelcome() {
  const w = el('div', { class: 'welcome' });
  const isOnline = state.scene === 'online';
  const sceneTitle = isOnline ? '线上客服话术指南' : '线下话术与诊断指南';
  const sceneDesc = isOnline
    ? '从左侧选择故障类别 → 选择具体故障 → 查看<strong>客服话术、远程引导、技术参考、可能订货</strong>。<br><br>📌 线上客服核心目标：通过引导客户预约门店检测维修。'
    : '从左侧选择故障类别 → 选择具体故障 → 查看<strong>客服话术、前台诊断、技术员处理、订货清单</strong>四个角色的标准流程。';

  const content = el('div', { class: 'welcome-content' }, [
    el('div', { class: 'welcome-icon' }, [isOnline ? '💬' : '🔧']),
    el('h2', {}, [sceneTitle]),
    el('p', { html: sceneDesc })
  ]);
  if (state.editMode) {
    content.appendChild(el('div', { class: 'edit-hint', html:
      '<strong>✎ 编辑模式已开启</strong><br>• 点击任何文字直接修改<br>• 鼠标悬停在故障/分类上会显示删除 ×<br>• 改完后点 <strong>导出 HTML</strong> 下载新版本' }));
  } else {
    content.appendChild(el('div', { class: 'edit-hint', style: 'background:#f3f1ec;color:var(--text-muted);border-left-color:var(--text-muted);',
      html: '💡 提示：顶部可切换<strong>线下话术</strong> ↔ <strong>线上客服</strong>。点击右上角 <strong>"进入编辑模式"</strong> 可直接修改文字、新增内容。' }));
  }
  w.appendChild(content);
  return w;
}

function renderRoleSection(role, fault) {
  const sec = el('div', { class: 'role-section', 'data-role': role });

  if (role === 'cs') {
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), '标准话术（对客户说）']));
    sec.appendChild(el('div', { class: 'speech-card' }, [
      el('div', {
        class: 'speech-text editable',
        contenteditable: state.editMode ? 'true' : 'false',
        onblur: (e) => { fault.customerService = e.target.textContent.trim(); saveData(); }
      }, [fault.customerService || (state.editMode ? '(点此输入话术)' : '— 无标准话术 —')])
    ]));

    if (!fault.customerAsk) fault.customerAsk = [];
    // 只在有内容或编辑模式才显示"需要询问客户"
    if (fault.customerAsk.length > 0 || state.editMode) {
      sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), '需要询问客户']));
      const ul = el('ul', { class: 'question-list' });
      fault.customerAsk.forEach((q, i) => {
        ul.appendChild(buildListItem(q, i, fault.customerAsk, 'question'));
      });
      sec.appendChild(ul);
      if (state.editMode) {
        sec.appendChild(el('button', {
          class: 'add-list-item-btn',
          onclick: () => { fault.customerAsk.push('新问题'); saveData(); renderDetail(); }
        }, ['+ 添加询问问题']));
      }
    }
  } else if (role === 'fd') {
    // 线上场景叫"远程引导"，线下叫"前台诊断"
    const fdLabel = state.scene === 'online' ? '远程引导客户' : '前台诊断步骤';
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), fdLabel]));
    const ul = el('ul', { class: 'step-list' });
    if (!fault.frontDeskDiag) fault.frontDeskDiag = [];
    fault.frontDeskDiag.forEach((s, i) => {
      ul.appendChild(buildListItem(s, i, fault.frontDeskDiag, 'step'));
    });
    sec.appendChild(ul);
    if (fault.frontDeskDiag.length === 0 && !state.editMode) {
      const emptyMsg = state.scene === 'online'
        ? '— 此故障线上客服无需远程引导步骤，直接走客服话术 —'
        : '— 此故障前台无需独立诊断步骤 —';
      sec.appendChild(el('p', { html: `<span style="color:var(--text-muted)">${emptyMsg}</span>` }));
    }
    if (state.editMode) {
      sec.appendChild(el('button', {
        class: 'add-list-item-btn',
        onclick: () => { fault.frontDeskDiag.push(state.scene === 'online' ? '新引导步骤' : '新步骤'); saveData(); renderDetail(); }
      }, [state.scene === 'online' ? '+ 添加远程引导步骤' : '+ 添加诊断步骤']));
    }
  } else if (role === 'tech') {
    const techLabel = state.scene === 'online' ? '技术参考（内部知识）' : '技术员处理流程';
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), techLabel]));
    const ul = el('ul', { class: 'step-list' });
    if (!fault.techProcess) fault.techProcess = [];
    fault.techProcess.forEach((s, i) => {
      ul.appendChild(buildListItem(s, i, fault.techProcess, 'step'));
    });
    sec.appendChild(ul);
    if (fault.techProcess.length === 0 && !state.editMode) {
      const emptyMsg = state.scene === 'online'
        ? '— 线上客服无需了解技术细节，必要时切到"线下话术"场景查看 —'
        : '— 配件代换测试即可 —';
      sec.appendChild(el('p', { html: `<span style="color:var(--text-muted)">${emptyMsg}</span>` }));
    }
    if (state.editMode) {
      sec.appendChild(el('button', {
        class: 'add-list-item-btn',
        onclick: () => { fault.techProcess.push('新流程'); saveData(); renderDetail(); }
      }, ['+ 添加技术流程']));
    }
  } else if (role === 'parts') {
    sec.appendChild(el('h3', {}, [el('span', { class: 'indicator' }), '可能订购的配件']));
    const list = el('div', { class: 'parts-list' });
    if (!fault.parts) fault.parts = [];
    fault.parts.forEach((p, i) => {
      list.appendChild(buildListItem(p, i, fault.parts, 'part'));
    });
    sec.appendChild(list);
    if (fault.parts.length === 0 && !state.editMode) {
      sec.appendChild(el('p', { html: '<span style="color:var(--text-muted)">— 此故障无需订货 —</span>' }));
    }
    if (state.editMode) {
      sec.appendChild(el('button', {
        class: 'add-list-item-btn',
        onclick: () => { fault.parts.push('新配件'); saveData(); renderDetail(); }
      }, ['+ 添加配件']));
    }
  }
  return sec;
}

function buildListItem(value, index, array, type) {
  const tag = (type === 'part') ? 'div' : 'li';
  const cls = (type === 'part') ? 'part-item' : (type === 'step' ? '' : '');
  const item = el(tag, { class: cls });

  const text = el('span', {
    class: 'editable',
    contenteditable: state.editMode ? 'true' : 'false',
    onblur: (e) => {
      const v = e.target.textContent.trim();
      if (v) { array[index] = v; saveData(); }
      else if (confirm('删除这一项？')) {
        array.splice(index, 1); saveData(); renderDetail();
      } else {
        e.target.textContent = array[index];
      }
    }
  }, [value]);
  item.appendChild(text);

  // 控制按钮
  if (state.editMode) {
    const controls = el('div', { class: 'list-item-controls' }, [
      el('button', {
        class: 'li-btn up', title: '上移',
        onclick: (ev) => {
          ev.stopPropagation();
          if (index > 0) {
            [array[index-1], array[index]] = [array[index], array[index-1]];
            saveData(); renderDetail();
          }
        }
      }, ['↑']),
      el('button', {
        class: 'li-btn down', title: '下移',
        onclick: (ev) => {
          ev.stopPropagation();
          if (index < array.length - 1) {
            [array[index+1], array[index]] = [array[index], array[index+1]];
            saveData(); renderDetail();
          }
        }
      }, ['↓']),
      el('button', {
        class: 'li-btn del', title: '删除',
        onclick: (ev) => {
          ev.stopPropagation();
          array.splice(index, 1); saveData(); renderDetail();
        }
      }, ['×'])
    ]);
    item.appendChild(controls);
  }

  return item;
}

/* ============================================================
   交互：选择
   ============================================================ */
function selectCategory(id) {
  state.categoryId = id;
  state.faultId = null;
  state.role = 'cs';
  $('#searchInput').value = '';
  state.search = '';
  renderCategories();
  renderFaultList();
  renderDetail();
}

/* ============================================================
   编辑：新增分类
   ============================================================ */
const ICON_OPTIONS = ['⚡','🔌','🔋','📱','🎤','📡','📶','🔘','📞','📷','🔲','👤','🛰️','💡','📏','🧭','🔒','🔧','💧','🌐','🎛️','🎚️','🖥️','💾','🎮','📺','⚙️','🛠️','🔨','📐','🧰','🏷️'];

let pickedIcon = '🔧';

function addCategory() {
  pickedIcon = '🔧';
  const iconGrid = ICON_OPTIONS.map(icon =>
    `<div class="modal-icon-option ${icon === pickedIcon ? 'selected' : ''}" data-icon="${icon}">${icon}</div>`
  ).join('');

  modal({
    title: '新增故障分类',
    html: `
      <label>分类名称 <span style="color:var(--danger)">*</span></label>
      <input type="text" id="catName" placeholder="例如：屏幕显示故障" autofocus>
      <label>选择图标</label>
      <div class="modal-icon-picker" id="iconPicker">${iconGrid}</div>
    `,
    onSave: () => {
      const name = $('#catName').value.trim();
      if (!name) throw new Error('请输入分类名称');
      const newCat = {
        id: uid('cat'),
        name: name,
        icon: pickedIcon,
        faults: []
      };
      REPAIR_DATA.categories.push(newCat);
      state.categoryId = newCat.id;
      saveData();
      renderCategories();
      renderFaultList();
      toast('已新增分类', 'success');
    }
  });

  setTimeout(() => {
    $$('.modal-icon-option').forEach(opt => {
      opt.onclick = () => {
        $$('.modal-icon-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        pickedIcon = opt.dataset.icon;
      };
    });
  }, 50);
}

function confirmDeleteCategory(catId) {
  const cat = REPAIR_DATA.categories.find(c => c.id === catId);
  if (!cat) return;
  if (!confirm(`确定删除分类"${cat.name}"？这将删除其中所有 ${cat.faults.length} 条故障，无法撤销。`)) return;
  REPAIR_DATA.categories = REPAIR_DATA.categories.filter(c => c.id !== catId);
  if (state.categoryId === catId) { state.categoryId = null; state.faultId = null; }
  saveData();
  renderCategories();
  renderFaultList();
  renderDetail();
  toast('已删除分类', 'success');
}

function renameCategory(catId) {
  const cat = REPAIR_DATA.categories.find(c => c.id === catId);
  if (!cat) return;
  modal({
    title: '重命名分类',
    html: `
      <label>分类名称</label>
      <input type="text" id="newCatName" value="${escapeHtml(cat.name)}" autofocus>
    `,
    onSave: () => {
      const v = $('#newCatName').value.trim();
      if (!v) throw new Error('名称不能为空');
      cat.name = v;
      saveData();
      renderCategories();
      renderFaultList();
      renderDetail();
      toast('已重命名', 'success');
    }
  });
  setTimeout(() => $('#newCatName').select(), 50);
}

function editCategoryIcon(catId) {
  const cat = REPAIR_DATA.categories.find(c => c.id === catId);
  if (!cat) return;
  pickedIcon = cat.icon;
  const iconGrid = ICON_OPTIONS.map(icon =>
    `<div class="modal-icon-option ${icon === cat.icon ? 'selected' : ''}" data-icon="${icon}">${icon}</div>`
  ).join('');
  modal({
    title: '修改分类图标',
    html: `<div class="modal-icon-picker" id="iconPicker">${iconGrid}</div>`,
    onSave: () => { cat.icon = pickedIcon; saveData(); renderCategories(); }
  });
  setTimeout(() => {
    $$('.modal-icon-option').forEach(opt => {
      opt.onclick = () => {
        $$('.modal-icon-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        pickedIcon = opt.dataset.icon;
      };
    });
  }, 50);
}

/* ============================================================
   编辑：新增故障
   ============================================================ */
function addFault(catId) {
  modal({
    title: '新增故障案例',
    html: `
      <label>故障现象（标题）<span style="color:var(--danger)">*</span></label>
      <input type="text" id="faultSymptom" placeholder="例如：屏幕白点黑点花屏" autofocus>
      <label>标准客服话术</label>
      <textarea id="faultCS" placeholder="对客户说的话，例如：先生/小姐，这种故障是屏幕问题…"></textarea>
      <label>标签（用逗号分隔，可选）</label>
      <input type="text" id="faultTags" placeholder="例如：屏幕,保资料">
      <div class="modal-hint">建议标签：保资料 / 需签名 / 主板级 / 前台先测 / 排线 / 软件</div>
    `,
    onSave: () => {
      const symptom = $('#faultSymptom').value.trim();
      if (!symptom) throw new Error('请输入故障现象');
      const newFault = {
        id: uid('fault'),
        symptom: symptom,
        tags: $('#faultTags').value.split(/[,，]/).map(t => t.trim()).filter(Boolean),
        customerService: $('#faultCS').value.trim(),
        customerAsk: [],
        frontDeskDiag: [],
        techProcess: [],
        parts: [],
        note: ''
      };
      const cat = REPAIR_DATA.categories.find(c => c.id === catId);
      cat.faults.push(newFault);
      state.faultId = newFault.id;
      state.role = 'cs';
      saveData();
      renderCategories();
      renderFaultList();
      renderDetail();
      toast('已新增故障，可继续编辑各角色内容', 'success');
    }
  });
}

/* ============================================================
   编辑：标签
   ============================================================ */
function addTag(fault) {
  modal({
    title: '添加标签',
    html: `
      <label>标签名称</label>
      <input type="text" id="tagInput" placeholder="例如：保资料 / 主板级 / 前台先测" autofocus>
      <div class="modal-hint">建议标签会自动配色：<br>
        🔴 红色：保资料 / 需签名 / 主板级 / 资料丢失<br>
        🔵 蓝色：前台先测 / 软件 / 运营商 / 主板可能<br>
        🟢 绿色：电池 / 按键 / 排线 / NFC / 屏幕 等
      </div>
    `,
    onSave: () => {
      const t = $('#tagInput').value.trim();
      if (!t) throw new Error('请输入标签名');
      if (!fault.tags) fault.tags = [];
      fault.tags.push(t);
      saveData();
      renderDetail();
      renderFaultList();
    }
  });
}

/* ============================================================
   编辑模式切换
   ============================================================ */
function toggleEditMode() {
  state.editMode = !state.editMode;
  document.body.classList.toggle('edit-mode', state.editMode);
  const btn = $('#editBtn');
  if (state.editMode) {
    btn.textContent = '✓ 退出编辑';
    btn.classList.add('edit-on');
    btn.classList.remove('primary');
    toast('编辑模式已开启 — 点击文字即可修改', 'success');
  } else {
    btn.textContent = '✎ 进入编辑模式';
    btn.classList.remove('edit-on');
    btn.classList.add('primary');
  }
  renderCategories();
  renderFaultList();
  renderDetail();
}

/* ============================================================
   导出 / 导入 / 重置
   ============================================================ */
function exportHTML() {
  // 导出时，把当前场景保存到 localStorage 的版本和另一个场景的版本合并到 DEFAULT_DATA
  // 先确保当前场景已保存
  saveData();

  // 收集两个场景的数据：当前场景用 REPAIR_DATA；另一个场景从 localStorage 或 DEFAULT_DATA 读
  const collected = {};
  ['offline', 'online'].forEach(scene => {
    if (scene === state.scene) {
      collected[scene] = REPAIR_DATA;
    } else {
      const raw = localStorage.getItem('repair_db_v3_' + scene);
      if (raw) {
        try { collected[scene] = JSON.parse(raw); }
        catch(e) { collected[scene] = DEFAULT_DATA[scene]; }
      } else {
        collected[scene] = DEFAULT_DATA[scene];
      }
    }
  });

  const dataStr = JSON.stringify(collected, null, 2);
  const fullHTML = document.documentElement.outerHTML;
  const marker = 'const DEFAULT_DATA = ';
  const idx = fullHTML.indexOf(marker);
  if (idx === -1) {
    toast('导出失败：找不到数据标记', 'error');
    return;
  }
  const before = fullHTML.substring(0, idx + marker.length);
  const after = fullHTML.substring(idx + marker.length);
  const endIdx = after.indexOf(';');
  const tail = after.substring(endIdx);
  const newHTML = '<!DOCTYPE html>\n' + before + dataStr + tail;

  const blob = new Blob([newHTML], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `维修话术查询系统_${stamp}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('已下载最新版本 HTML（含两个场景）', 'success');
}

function exportJSON() {
  const dataStr = JSON.stringify(REPAIR_DATA, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `维修话术_数据备份_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData() {
  $('#importFile').click();
}

function handleImport(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.categories || !Array.isArray(data.categories)) throw new Error('文件格式不正确（缺少 categories 数组）');
      if (!confirm(`确定要导入此文件到「${sceneLabel()}」场景？现有数据将被覆盖。`)) return;
      REPAIR_DATA = data;
      saveData();
      state.categoryId = null;
      state.faultId = null;
      renderCategories();
      renderFaultList();
      renderDetail();
      toast(`已导入数据到「${sceneLabel()}」`, 'success');
    } catch(err) {
      toast('导入失败：' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm(`确定恢复「${sceneLabel()}」为默认数据？\n您当前场景的所有修改将丢失。建议先点"导出 HTML"备份。`)) return;
  REPAIR_DATA = deepClone(DEFAULT_DATA[state.scene] || DEFAULT_DATA);
  saveData();
  state.categoryId = null;
  state.faultId = null;
  $('#searchInput').value = '';
  state.search = '';
  renderCategories();
  renderFaultList();
  renderDetail();
  toast(`已恢复「${sceneLabel()}」默认数据`, 'success');
}

/* ============================================================
   初始化
   ============================================================ */
// 设置 body 场景属性
document.body.setAttribute('data-scene', state.scene);

loadData();

$('#searchInput').addEventListener('input', e => {
  state.search = e.target.value.trim();
  renderFaultList();
});
$('#editBtn').onclick = toggleEditMode;
$('#exportBtn').onclick = exportHTML;
$('#importBtn').onclick = importData;
$('#resetBtn').onclick = resetData;
$('#addCategoryBtn').onclick = addCategory;
$('#importFile').onchange = (e) => {
  if (e.target.files[0]) handleImport(e.target.files[0]);
  e.target.value = '';
};

// 场景切换按钮
$$('.scene-btn').forEach(b => {
  b.onclick = () => switchScene(b.dataset.scene);
});

renderCategories();
renderFaultList();
renderDetail();

// 第一次加载提示
if (!localStorage.getItem('repair_db_v3_seen')) {
  setTimeout(() => {
    toast('💡 顶部可切换「线下话术」/「线上客服」两个场景');
    localStorage.setItem('repair_db_v3_seen', '1');
  }, 800);
}
</script>
